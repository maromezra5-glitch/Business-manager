name: Business Logic Unit Tests
on:
  push:
    branches: [main]
    paths:
      - 'business-manager.html'
      - 'tests/**'
      - 'package.json'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
