function getTipRec(ds, shift) {
  var sr = (S.tips[ds] || {})[shift];
  if (!sr || typeof sr === 'number') return {amount: toNum(sr), workers: []};
  return {amount: toNum(sr.amount), workers: sr.workers || []};
}

function timeDiff(from, to) {
  if (!from || !to) return 0;
  var fp = from.split(':').map(Number);
  var tp = to.split(':').map(Number);
  var mins = (tp[0]*60 + tp[1]) - (fp[0]*60 + fp[1]);
  if (mins <= 0) mins += 24*60;
  return parseFloat((mins / 60).toFixed(2));
}

function monthTipTotals(ym) {
  var days = daysInMonth(ym);
  var defs = getShiftDefs();
  var totals = {total: 0};
  defs.forEach(function(def){ totals[def.id] = 0; });
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    defs.forEach(function(def) {
      var amt = getTipRec(ds, def.id).amount;
      totals[def.id] += amt;
      totals.total   += amt;
    });
  }
  return totals;
}

function getEmpTipsForMonth(empId, ym) {
  var total = 0;
  var days  = daysInMonth(ym);
  var defs  = getShiftDefs();
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    defs.forEach(function(def) {
      var rec = getTipRec(ds, def.id);
      var totalHrs = rec.workers.reduce(function(s, w) { return s + timeDiff(w.from, w.to); }, 0);
      var perHr = (totalHrs > 0 && rec.amount > 0) ? rec.amount / totalHrs : 0;
      rec.workers.forEach(function(w) {
        if (w.empId === empId) {
          var hrs = timeDiff(w.from, w.to);
          total  += (perHr > 0 ? hrs * perHr : 0) + toNum(w.adjust);
        }
      });
    });
  }
  return total;
}

function getTipsMonthDetail(ym) {
  var days     = daysInMonth(ym);
  var defs     = getShiftDefs();
  var minPerHr = getTipsMinPerHr();
  var byEmp    = {};
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    defs.forEach(function(def) {
      var rec      = getTipRec(ds, def.id);
      var totalHrs = rec.workers.reduce(function(s,w){ return s + timeDiff(w.from||'00:00', w.to||'00:00'); }, 0);
      var perHr    = (totalHrs > 0 && rec.amount > 0) ? rec.amount / totalHrs : 0;
      rec.workers.forEach(function(w) {
        if (!w.empId) return;
        if (!byEmp[w.empId]) byEmp[w.empId] = {hours:0, tips:0, supplement:0};
        var hrs   = timeDiff(w.from||'00:00', w.to||'00:00');
        var base  = perHr > 0 ? hrs * perHr : 0;
        var adj   = toNum(w.adjust);
        var final = base + adj;
        // supplement ignores negative adjustments (deductions are personal, not tip-related)
        var suppBase = base + Math.max(0, adj);
        var suppl = hrs > 0 ? Math.max(0, hrs * minPerHr - suppBase) : 0;
        byEmp[w.empId].hours      += hrs;
        byEmp[w.empId].tips       += final;
        byEmp[w.empId].supplement += suppl;
      });
    });
  }
  return byEmp;
}

function getDetailedSupplementReport(ym) {
  var days     = daysInMonth(ym);
  var defs     = getShiftDefs();
  var minPerHr = getTipsMinPerHr();
  var byEmp    = {};
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    var wd = getDow(ds);
    defs.forEach(function(def) {
      var rec      = getTipRec(ds, def.id);
      var totalHrs = rec.workers.reduce(function(s,w){ return s + timeDiff(w.from||'00:00', w.to||'00:00'); }, 0);
      var perHr    = (totalHrs > 0 && rec.amount > 0) ? rec.amount / totalHrs : 0;
      rec.workers.forEach(function(w) {
        if (!w.empId) return;
        var hrs = timeDiff(w.from||'00:00', w.to||'00:00');
        if (hrs <= 0) return;
        var base     = perHr > 0 ? hrs * perHr : 0;
        var adj      = toNum(w.adjust);
        var final    = base + adj;
        var minGuar  = hrs * minPerHr;
        var suppBase = base + Math.max(0, adj);
        var suppl    = Math.max(0, minGuar - suppBase);
        if (!byEmp[w.empId]) byEmp[w.empId] = { totalHours:0, totalTips:0, totalSuppl:0, shifts:[], adjRows:[] };
        byEmp[w.empId].totalHours += hrs;
        byEmp[w.empId].totalTips  += final;
        byEmp[w.empId].totalSuppl += suppl;
        if (suppl > 0) {
          byEmp[w.empId].shifts.push({ ds:ds, wd:wd, shiftId:def.id, shiftName:def.name,
            from:w.from||'', to:w.to||'', hours:hrs, perHr:perHr, base:base, adj:adj, final:final, minGuar:minGuar, suppl:suppl });
        }
        if (adj !== 0) {
          byEmp[w.empId].adjRows.push({ ds:ds, wd:wd, shiftName:def.name, adj:adj, note:(w.adjustNote||'').trim() });
        }
      });
    });
  }
  return byEmp;
}

function getEmpTipsShifts(empId, ym) {
  var days = daysInMonth(ym);
  var defs = getShiftDefs();
  var rows = [];
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    defs.forEach(function(def) {
      var rec = getTipRec(ds, def.id);
      var w = rec.workers.find(function(w){ return w.empId === empId; });
      if (!w) return;
      var totalHrs = rec.workers.reduce(function(s,ww){ return s + timeDiff(ww.from||'00:00', ww.to||'00:00'); }, 0);
      var perHr = (totalHrs > 0 && rec.amount > 0) ? rec.amount / totalHrs : 0;
      var hrs   = timeDiff(w.from||'00:00', w.to||'00:00');
      var base  = perHr > 0 ? hrs * perHr : 0;
      var adj   = toNum(w.adjust);
      rows.push({ ds:ds, day:getDow(ds), shift:def.id, shiftName:def.name, from:w.from||'', to:w.to||'', hours:hrs, base:base, adj:adj, final:base+adj });
    });
  }
  return rows;
}

function updateTipsCalc(ds, shift) {
  var amtEl = document.getElementById('tamt-' + shift);
  if (!amtEl) return;
  var amount = toNum(amtEl.value);

  var workers = [];
  var i = 0;
  while (document.getElementById('tw-emp-' + shift + '-' + i)) {
    workers.push({
      empId:      document.getElementById('tw-emp-' + shift + '-' + i).value,
      from:       getTimePickerVal('tw-from-' + shift + '-' + i),
      to:         getTimePickerVal('tw-to-'   + shift + '-' + i),
      adjust:     toNum((document.getElementById('tw-adj-'   + shift + '-' + i) || {}).value),
      adjustNote: ((document.getElementById('tw-anote-' + shift + '-' + i) || {}).value || '')
    });
    i++;
  }

  // Auto-save non-empty adjustment notes as shortcuts
  workers.forEach(function(w) {
    if (w.adjustNote && w.adjustNote.trim().length >= 2) saveAdjNote(w.adjustNote.trim());
  });

  var totalHrs   = workers.reduce(function(s, w) { return s + timeDiff(w.from, w.to); }, 0);
  var perHr      = (totalHrs > 0 && amount > 0) ? amount / totalHrs : 0;
  var totalFinal = 0;

  var minPerHr = getTipsMinPerHr();
  workers.forEach(function(w, idx) {
    var hrs    = timeDiff(w.from, w.to);
    var base   = perHr > 0 ? hrs * perHr : 0;
    var adj    = toNum(w.adjust);
    var final  = base + adj;
    var suppBase2 = base + Math.max(0, adj);
    var suppl  = hrs > 0 ? Math.max(0, hrs * minPerHr - suppBase2) : 0;
    totalFinal += final;
    var hEl  = document.getElementById('tw-hrs-'   + shift + '-' + idx);
    var sEl  = document.getElementById('tw-share-' + shift + '-' + idx);
    var fEl  = document.getElementById('tw-final-' + shift + '-' + idx);
    var spEl = document.getElementById('tw-suppl-' + shift + '-' + idx);
    if (hEl) hEl.textContent = hrs > 0 ? hrs.toFixed(1) : '—';
    if (sEl) { sEl.textContent = base > 0 ? ILS(base) : '—'; sEl.style.color = base > 0 ? 'var(--primary)' : 'var(--text-muted)'; }
    // update visible result labels
    var hLblEl = document.getElementById('tw-hrs-'   + shift + '-' + idx + '-lbl');
    var sLblEl = document.getElementById('tw-share-' + shift + '-' + idx + '-lbl');
    if (hLblEl) hLblEl.textContent = hrs > 0 ? ('⏱ ' + hrs.toFixed(1) + ' ש\'') : '⏱ —';
    if (sLblEl) {
      if (base > 0) {
        var metaHtml = ILS(base) + ' מטיפים';
        if (adj !== 0) metaHtml += adj > 0
          ? ' <span style="color:var(--success)">+ ₪' + Math.abs(adj).toFixed(0) + ' תיקון</span>'
          : ' <span style="color:var(--error)">− ₪' + Math.abs(adj).toFixed(0) + ' תיקון</span>';
        sLblEl.innerHTML = metaHtml;
        sLblEl.style.color = 'var(--text-sec)';
      } else {
        sLblEl.textContent = hrs > 0 ? 'הזן סכום טיפים' : 'הזן שעות עבודה';
        sLblEl.style.color = 'var(--text-muted)';
      }
    }
    if (fEl) {
      fEl.textContent = final !== 0 ? ILS(final) : '—';
      fEl.style.color = final > 0 ? 'var(--success)' : final < 0 ? 'var(--error)' : 'var(--text-muted)';
      fEl.style.animation = 'numChange .2s ease';
      setTimeout(function(){ if (fEl) fEl.style.animation = ''; }, 200);
    }
    if (spEl) {
      var minGuar2 = hrs * minPerHr;
      if (hrs <= 0) {
        spEl.style.display = 'none';
      } else if (suppl > 0) {
        spEl.className = 'twc2-suppl-bad';
        spEl.style.display = '';
        spEl.style.padding = '12px 16px';
        spEl.style.gap = '12px';
        spEl.innerHTML = '<div style="font-size:22px;line-height:1;flex-shrink:0">⚠️</div>' +
          '<div style="flex:1">' +
            '<div style="font-size:14px;font-weight:900;color:#DC2626;margin-bottom:5px">נדרשת השלמת מינימום לעובד זה</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">' +
              '<span style="background:#FEE2E2;color:#991B1B;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700">' + hrs.toFixed(1) + ' ש\' \xD7 ₪' + minPerHr + ' = מינ\' ₪' + minGuar2.toFixed(0) + '</span>' +
              '<span style="color:#B91C1C;font-size:13px">←</span>' +
              '<span style="background:#FEE2E2;color:#991B1B;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700">טיפים ₪' + suppBase2.toFixed(0) + '</span>' +
              '<span style="color:#B91C1C;font-size:13px">= חסר</span>' +
              '<span style="background:#DC2626;color:#fff;padding:4px 14px;border-radius:10px;font-size:13px;font-weight:900">₪' + suppl.toFixed(0) + ' למשכורת</span>' +
            '</div>' +
          '</div>';
      } else {
        spEl.style.display = 'none';
      }
    }
  });

  var thEl = document.getElementById('shift-thrs-'  + shift);
  var phEl = document.getElementById('shift-phr-'   + shift);
  var fnEl = document.getElementById('shift-final-' + shift);
  if (thEl) thEl.textContent = totalHrs > 0 ? totalHrs.toFixed(1) : '—';
  if (phEl) phEl.textContent = perHr > 0 ? ILS(perHr) : '—';
  if (fnEl) fnEl.textContent = totalFinal > 0 ? ILS(totalFinal) : '—';

  if (!S.tips[ds]) S.tips[ds] = {};
  S.tips[ds][shift] = {amount: amount, workers: workers};
  persist();

  var defs2 = getShiftDefs();
  var rowEl = document.querySelector('[data-tips-ds="' + ds + '"]');
  if (rowEl) {
    var cells = rowEl.cells;
    var dayT = 0;
    var wc2  = 0;
    defs2.forEach(function(def2, di) {
      var amt2 = getTipRec(ds, def2.id).amount;
      dayT += amt2;
      wc2  += getTipRec(ds, def2.id).workers.length;
      if (cells[di + 1]) cells[di + 1].textContent = amt2 > 0 ? ILS(amt2) : '—';
    });
    var totIdx = defs2.length + 1;
    var wcIdx  = defs2.length + 2;
    if (cells[totIdx]) cells[totIdx].innerHTML = '<strong style="color:' + (dayT>0?'var(--primary)':'var(--text-muted)') + '">' + (dayT>0?ILS(dayT):'—') + '</strong>';
    if (cells[wcIdx])  cells[wcIdx].innerHTML  = '<span style="font-size:12px;color:var(--text-muted)">' + (wc2>0?wc2+' עובד':'—') + '</span>';
  }
  var tots = monthTipTotals(document.getElementById('tips-month').value);
  defs2.forEach(function(def2) {
    var el = document.getElementById('ts-shift-' + def2.id);
    if (el) el.textContent = ILS(tots[def2.id] || 0);
  });
  var tsGrand = document.getElementById('ts-grand');
  if (tsGrand) tsGrand.textContent = ILS(tots.total);
}

function addTipsWorker(ds, shift) {
  if (!S.tips[ds]) S.tips[ds] = {};
  var sr = S.tips[ds][shift];
  if (!sr || typeof sr === 'number') S.tips[ds][shift] = {amount: toNum(sr), workers: []};
  var cfg = getShiftCfg(shift);
  S.tips[ds][shift].workers.push({empId:'', from: cfg.from, to: cfg.to, adjust:0, adjustNote:''});
  persist();
  var c = document.getElementById('shift-section-' + shift);
  if (c) c.innerHTML = renderShiftSection(ds, shift);
}

function removeTipsWorker(ds, shift, idx) {
  var sr = (S.tips[ds] || {})[shift];
  if (!sr || !sr.workers) return;
  sr.workers.splice(idx, 1);
  persist();
  var c = document.getElementById('shift-section-' + shift);
  if (c) c.innerHTML = renderShiftSection(ds, shift);
}

function saveShiftTemplate(ds, shift) {
  var sr = (S.tips[ds] || {})[shift];
  if (!sr || !sr.workers || !sr.workers.length) { toast('אין עובדים במשמרת לשמירה', 'err'); return; }
  var workers = sr.workers.filter(function(w){ return w.empId; });
  if (!workers.length) { toast('בחר עובדים לפני השמירה', 'err'); return; }
  if (!S.settings) S.settings = {};
  if (!S.settings.shiftTemplates) S.settings.shiftTemplates = {};
  S.settings.shiftTemplates[shift] = workers.map(function(w){ return {empId:w.empId, from:w.from, to:w.to}; });
  persist();
  toast('✅ תבנית נשמרה — ' + workers.length + ' עובדים', 'ok');
}

function loadShiftTemplate(ds, shift) {
  var tmpl = ((S.settings || {}).shiftTemplates || {})[shift];
  if (!tmpl || !tmpl.length) { toast('אין תבנית שמורה למשמרת זו', 'err'); return; }
  if (!S.tips[ds]) S.tips[ds] = {};
  var sr = S.tips[ds][shift];
  if (!sr || typeof sr === 'number') S.tips[ds][shift] = {amount: toNum(sr), workers: []};
  var existing = S.tips[ds][shift].workers.map(function(w){ return w.empId; });
  var added = 0;
  tmpl.forEach(function(t) {
    if (t.empId && existing.indexOf(t.empId) < 0) {
      S.tips[ds][shift].workers.push({empId:t.empId, from:t.from, to:t.to, adjust:0, adjustNote:''});
      added++;
    }
  });
  if (!added) { toast('כל עובדי התבנית כבר במשמרת', 'ok'); return; }
  persist();
  var c = document.getElementById('shift-section-' + shift);
  if (c) c.innerHTML = renderShiftSection(ds, shift);
  toast('✅ נטענו ' + added + ' עובדים מהתבנית', 'ok');
}

function stepTime(ds, shift, idx, field, deltaMins) {
  var baseId  = 'tw-' + field + '-' + shift + '-' + idx;
  var cur     = getTimePickerVal(baseId);
  var parts   = cur.split(':').map(Number);
  var total   = parts[0]*60 + parts[1] + deltaMins;
  total = ((total % 1440) + 1440) % 1440;
  total = Math.round(total / 5) * 5;
  if (total >= 1440) total = 0;
  var hEl = document.getElementById(baseId + '-h');
  var mEl = document.getElementById(baseId + '-m');
  if (hEl) hEl.value = Math.floor(total / 60);
  if (mEl) mEl.value = total % 60;
  updateTipsCalc(ds, shift);
}

function stepAdjust(ds, shift, idx, delta) {
  var el = document.getElementById('tw-adj-' + shift + '-' + idx);
  if (!el) return;
  el.value = toNum(el.value) + delta;
  updateTipsCalc(ds, shift);
}

function renderTips() {
  var ym    = document.getElementById('tips-month').value;
  var cont  = document.getElementById('tips-content');
  var tots  = monthTipTotals(ym);
  var days  = daysInMonth(ym);
  var defs  = getShiftDefs();
  var minPerHr = getTipsMinPerHr();

  // Build monthly table rows dynamically per shift
  var tbody = '';
  for (var d = 1; d <= days; d++) {
    var ds  = dateFull(ym, d);
    var wd  = getDow(ds);
    var dayT = 0;
    var wc   = 0;
    var shiftCells = '';
    defs.forEach(function(def, di) {
      var amt = getTipRec(ds, def.id).amount;
      dayT += amt;
      wc   += getTipRec(ds, def.id).workers.length;
      shiftCells += '<td>' + (amt > 0 ? ILS(amt) : '—') + '</td>';
    });
    tbody += '<tr data-tips-ds="' + ds + '" class="' + (wd===6?'tr-shabbat':'') + '" style="cursor:pointer" onclick="selectTipsDay(\'' + ds + '\')">';
    tbody += dateCell(d, wd, ds);
    tbody += shiftCells;
    tbody += '<td><strong style="color:' + (dayT>0?'var(--primary)':'var(--text-muted)') + '">' + (dayT>0?ILS(dayT):'—') + '</strong></td>';
    tbody += '<td><span style="font-size:12px;color:var(--text-muted)">' + (wc > 0 ? wc + ' עובד' : '—') + '</span></td>';
    tbody += '</tr>';
  }

  // Settings panel — dynamic shifts + supplement rate
  var shiftRows = defs.map(function(def, i) {
    var canRemove = defs.length > 1;
    return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
      '<input type="text" class="ti" style="width:90px;font-weight:700" value="' + escHtml(def.name) + '" placeholder="שם משמרת" onchange="saveShiftDef(\'' + def.id + '\',\'name\',this.value)">' +
      '<label style="font-size:12px;color:var(--text-muted)">מ:</label>' +
      '<input type="time" class="ti" style="width:100px" value="' + def.from + '" onchange="saveShiftDef(\'' + def.id + '\',\'from\',this.value)">' +
      '<label style="font-size:12px;color:var(--text-muted)">עד:</label>' +

        '<div style="display:flex;align-items:center;gap:10px">' +
          '<label style="font-size:12.5px;font-weight:700;color:var(--text-sec);white-space:nowrap">💰 מינימום השלמה לשעה (₪):</label>' +
          '<input type="number" class="ti" style="width:80px;font-size:14px;font-weight:700;text-align:center" value="' + minPerHr + '" min="0" step="1" onchange="saveTipsMinPerHr(this.value)">' +

  // Summary cards
  var summaryCards = defs.map(function(def) {

    '<div class="table-wrap"><table>' +

        '<th style="min-width:120px">יום</th>' +

        '<th style="min-width:80px">עובדים</th>' +

        var empName = escHtml(emp ? emp.name : x.empId);

          var dayLabel  = DHE[sh.wd];

          return '<tr>' +
            '<td><strong style="font-size:15px">' + dateLabel + '</strong> <span style="font-size:13px;color:var(--text-sec);font-weight:700">' + dayLabel + '</span></td>' +
            '<td><span style="font-size:13px;font-weight:800;padding:3px 10px;border-radius:10px;background:rgba(0,0,0,.07)">' + escHtml(sh.shiftName) + '</span></td>' +
            '<td style="text-align:center;font-size:14px;font-weight:700">' + (sh.from ? sh.from : '—') + '–' + (sh.to ? sh.to : '—') + '</td>' +
            '<td style="text-align:center;font-size:15px;font-weight:900">' + sh.hours.toFixed(1) + '</td>' +
            '<td style="text-align:center;color:var(--text);font-size:14px;font-weight:700">' + (sh.perHr > 0 ? ILS(sh.perHr) : '—') + '</td>' +
            '<td style="text-align:center;font-size:14px;font-weight:700">' + ILS(sh.base) + '</td>' +
            '<td style="text-align:center">' + adjTxt + '</td>' +
            '<td style="text-align:center;font-size:16px;font-weight:900;color:var(--success)">' + ILS(sh.final) + '</td>' +
            '<td style="text-align:center;font-weight:800;color:#7C3AED;font-size:14px">' + ILS(sh.minGuar) + '</td>' +
            '<td style="text-align:center"><strong style="color:#DC2626;font-size:16px;font-weight:900">' + ILS(sh.suppl) + '</strong></td>' +
          '</tr>';

        // Monthly totals for this employee
        var perHrAvg = x.totalHours > 0 ? x.totalTips / x.totalHours : 0;

        return '<div class="srpt-emp">' +
          '<div class="srpt-emp-hdr">' +
            '<div style="display:flex;align-items:center;gap:12px">' +
              '<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#DC2626,#991B1B);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0">' +

            '<table class="srpt-tbl">' +

                '<th>📅 תאריך</th>' +
                '<th>משמרת</th>' +
                '<th style="text-align:center">כניסה–יציאה</th>' +
                '<th style="text-align:center">שעות</th>' +
                '<th style="text-align:center">₪/שעה</th>' +
                '<th style="text-align:center">בסיס טיפים</th>' +
                '<th style="text-align:center">תיקון</th>' +
                '<th style="text-align:center;color:var(--success)">✅ קיבל בפועל</th>' +
                '<th style="text-align:center;color:#7C3AED">מינ\' מובטח</th>' +
                '<th style="text-align:center;color:#DC2626">⚠️ להשלמה</th>' +
              '</tr></thead>' +
              '<tbody>' + shiftRows + '</tbody>' +

            '</table>' +
          '</div>' +
          // Adjustments section grouped by note
          (function(){
            var adjRows = x.adjRows || [];
            if (!adjRows.length) return '';
            var groups = {};

            adjRows.forEach(function(r) {
              var key = r.note || '(ללא הערה)';
              if (!groups[key]) { groups[key] = { note: key, rows: [], total: 0 }; groupOrder.push(key); }
              groups[key].rows.push(r);
              groups[key].total += r.adj;
            });
            var totalAdj = adjRows.reduce(function(s,r){ return s + r.adj; }, 0);
            var groupHtml = groupOrder.map(function(key) {
              var g = groups[key];
              var rowsHtml = g.rows.map(function(r) {
                var dateLabel = r.ds.slice(8) + '/' + r.ds.slice(5,7);
                return '<tr>' +
                  '<td><strong style="font-size:13px">' + dateLabel + '</strong> <span style="font-size:11px;color:var(--text-muted)">' + DHE[r.wd] + '</span></td>' +

                  '<td style="text-align:center;font-size:14px;font-weight:800;color:' + (r.adj > 0 ? 'var(--success)' : 'var(--error)') + '">' + (r.adj > 0 ? '+' : '') + ILS(r.adj) + '</td>' +

                '<div style="padding:8px 14px;background:rgba(124,58,237,.07);border-right:3px solid #7C3AED;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">' +
                  '<div style="font-size:13px;font-weight:800;color:#5B21B6">📝 ' + escHtml(g.note) + '</div>' +

            }).join('');
            return '<div style="padding:14px 18px;background:rgba(124,58,237,.03);border-top:2px solid rgba(124,58,237,.12)">' +
              '<div style="font-size:13px;font-weight:900;color:#5B21B6;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">' +
                '<span>⚙️ תיקונים החודש — לפי סיבה</span>' +
                '<span style="font-size:13px;font-weight:900;color:' + (totalAdj >= 0 ? 'var(--success)' : 'var(--error)') + '">סה"כ: ' + (totalAdj > 0 ? '+' : '') + ILS(totalAdj) + '</span>' +
              '</div>' +
              groupHtml +
            '</div>';
          })() +
          // Explanation note
          '<div style="padding:10px 18px;background:rgba(220,38,38,.04);border-top:1px solid rgba(220,38,38,.1);font-size:12.5px;color:#7F1D1D;display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
            '<span>📐 <strong>איך מחשבים?</strong></span>' +
            '<span>שעות × ₪' + minPerHr + '/ש\' = מינ\' מובטח · אם קיבל פחות מהטיפים — מוסיפים את ההפרש <strong>למשכורת החודשית</strong></span>' +
            '<button class="btn btn-sm btn-secondary" style="margin-right:auto;font-size:12px;padding:4px 12px" onclick="openEmpTipsModal(\'' + x.empId + '\',\'' + ym + '\')">🔍 פירוט מלא</button>' +
          '</div>' +
        '</div>';
      }).join('');

      // ── Employees without supplement ──
      var okSection = noSuppl.length
        ? '<div class="srpt-ok">' +
            '<div style="padding:11px 22px;font-size:12px;font-weight:800;color:var(--success);border-bottom:1px solid rgba(0,0,0,.05);letter-spacing:.3px">✅ עובדים שעל המינימום</div>' +
            noSuppl.map(function(x) {
              var emp = x.emp;
              var perHr2 = x.totalHours > 0 ? x.totalTips / x.totalHours : 0;
              return '<div class="srpt-ok-row">' +
                '<div style="display:flex;align-items:center;gap:10px">' +
                  '<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#16A34A,#15803D);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0">' +
                    escHtml(emp ? emp.name.charAt(0) : '?') + '</div>' +
                  '<div>' +
                    '<div style="font-weight:800;color:var(--text)">' + escHtml(emp ? emp.name : x.empId) + '</div>' +
                    (emp && getEmpRoleStr(emp) ? '<div style="font-size:11.5px;color:var(--text-muted)">' + escHtml(getEmpRoleStr(emp)) + '</div>' : '') +
                  '</div>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">' +
                  '<span style="font-size:12.5px;color:var(--text-muted)">' + x.totalHours.toFixed(1) + ' ש\'</span>' +
                  '<span style="font-size:13px;font-weight:700;color:var(--primary)">' + ILS(x.totalTips) + '</span>' +
                  '<span style="font-size:12px;color:var(--text-muted)">' + ILS(perHr2) + '/ש\'</span>' +
                  '<span style="font-size:12.5px;font-weight:800;color:var(--success);padding:3px 10px;background:rgba(22,163,74,.1);border-radius:10px">✅ ללא השלמה</span>' +
                '</div>' +
              '</div>';
            }).join('') +
          '</div>'
        : '';

      return '<div class="srpt">' +
        // ── Dark header ──
        '<div class="srpt-hdr">' +
          '<div>' +
            '<div style="font-size:20px;font-weight:900;color:#fff;letter-spacing:-.4px">📊 דוח השלמות מינימום טיפים</div>' +
            '<div style="font-size:13px;color:rgba(255,255,255,.6);margin-top:5px">' +
              mn2 + ' &nbsp;·&nbsp; מינימום: ₪' + minPerHr + ' לשעה &nbsp;·&nbsp; חישוב נפרד לכל משמרת' +
            '</div>' +
            '<div style="font-size:11.5px;color:rgba(255,255,255,.45);margin-top:5px;font-style:italic">💡 ההשלמות מתווספות למשכורת החודשית — לא מחולקות במעטפה</div>' +
          '</div>' +
          (totalSuppl > 0
            ? '<div class="srpt-badge-red">' +
                '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;opacity:.8;margin-bottom:4px">לתוספת למשכורת</div>' +
                '<div style="font-size:30px;font-weight:900;line-height:1">' + ILS(totalSuppl) + '</div>' +
                '<div style="font-size:10.5px;opacity:.75;margin-top:4px">' + needSuppl.length + ' עובד' + (needSuppl.length !== 1 ? 'ים' : '') + ' זקוקים להשלמה</div>' +
              '</div>'
            : '<div class="srpt-badge-grn">✅ <span>כל העובדים מעל המינימום</span></div>') +
        '</div>' +
        // ── Legend bar ──
        (needSuppl.length > 0
          ? '<div style="padding:10px 22px;background:rgba(220,38,38,.06);border-bottom:1px solid rgba(220,38,38,.1);font-size:12px;color:#7F1D1D;display:flex;align-items:center;gap:6px">' +
              '<span style="font-size:14px">⚠️</span>' +
              '<span><strong>' + needSuppl.length + ' עובד' + (needSuppl.length > 1 ? 'ים זקוקים' : ' זקוק') + ' להשלמת מינימום</strong> — הסכומים להלן מתווספים למשכורת החודשית שלהם</span>' +
            '</div>'
          : '') +
        // ── Employee sections ──
        empSections +
        // ── OK employees ──
        okSection +
      '</div>';
    })();
}

function renderSuppliersMgmt() {
  var cont = document.getElementById('suppliers-mgmt');
  var chips = S.suppliers.map(function(s, i) {
    return '<div class="chip">' + escHtml(s) +
      '<button onclick="removeSupplier(' + i + ')" title="הסר">✕</button></div>';
  }).join('');

  cont.innerHTML =
    '<div class="card-title">🏭 ניהול ספקים</div>' +
    '<div class="chip-list">' + (chips || '<span style="color:var(--text-muted);font-size:13px">טרם הוספת ספקים</span>') + '</div>' +
    '<div class="add-row">' +
      '<input class="form-control" id="new-sup" type="text" placeholder="שם ספק חדש (לדוגמה: קוקה-קולה)" style="max-width:300px" onkeydown="if(event.key===\'Enter\')addSupplier()">' +
      '<button class="btn btn-primary" onclick="addSupplier()">➕ הוסף ספק</button>' +
    '</div>';
}

function addSupplier() {
  var inp  = document.getElementById('new-sup');
  var name = inp.value.trim();
  if (!name) return;
  if (S.suppliers.indexOf(name) !== -1) { toast('ספק זה כבר קיים', 'err'); return; }
  S.suppliers.push(name);
  persist();
  inp.value = '';
  renderSuppliersMgmt();
  renderPurchasesTable();
  toast('✅ ספק "' + name + '" נוסף');
}

function removeSupplier(idx) {
  var name = S.suppliers[idx];
  if (!confirm('להסיר את הספק "' + name + '"?')) return;
  S.suppliers.splice(idx, 1);
  persist();
  renderSuppliersMgmt();
  renderPurchasesTable();
  toast('הספק "' + name + '" הוסר', 'err');
}

function renderPurchases() { renderSuppliersMgmt(); renderPurchasesTable(); }

function renderPurchasesTable() {
  var ym   = document.getElementById('pur-month').value;
  var sups = S.suppliers;
  var cont = document.getElementById('pur-content');

  if (!sups.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">🛒</div><div class="empty-title">הוסף ספקים תחילה</div><div class="empty-text">השתמש בחלק למעלה להוספת ספקים</div></div>';
    return;
  }

  var days = daysInMonth(ym);
  var pur  = S.purchases[ym] || {};
  var sTotals = {};
  sups.forEach(function(s){ sTotals[s] = 0; });

  var tbody = '';
  for (var d = 1; d <= days; d++) {
    var ds  = dateFull(ym, d);
    var wd  = getDow(ds);
    var rec = pur[ds] || {};
    var dt  = 0;
    sups.forEach(function(s){ var x=toNum(rec[s]); sTotals[s]+=x; dt+=x; });

    tbody += '<tr class="' + (wd===6?'tr-shabbat':'') + '">';
    tbody += dateCell(d, wd, ds);
    sups.forEach(function(s){
      tbody += '<td><input type="number" class="ti ti-w80" min="0" step="1"' +
        ' data-pds="' + ds + '" data-psup="' + escHtml(s) + '"' +
        ' value="' + (toNum(rec[s]) || '') + '" placeholder="0"' +

    });

  }

  var grandTotal = Object.values(sTotals).reduce(function(a,b){return a+b;}, 0);
  var vat        = toNum((S.settings || {}).vat) || 17;
  var vatFactor  = 1 + vat / 100;

  sups.forEach(function(s){ theadCells += '<th style="min-width:90px">' + escHtml(s) + '</th>'; });
  theadCells += '<th style="min-width:100px">📦 סה"כ יומי</th>';

  var tfootCells = '<td class="sticky-col"><strong>סה"כ עם מע"מ</strong></td>';

    tfootCells += '<td data-stot="' + escHtml(s) + '"><strong>' + (sTotals[s]>0?ILS(sTotals[s]):'—') + '</strong></td>';
  });
  tfootCells += '<td id="pur-grand"><strong style="color:var(--primary);font-size:15px">' + ILS(grandTotal) + '</strong></td>';

  var preVatStyle = 'color:#2563eb;font-size:12.5px;font-weight:600';
  var tfootPreVat = '<td class="sticky-col" style="' + preVatStyle + '">ללא מע"מ (' + vat + '%)</td>';
  sups.forEach(function(s){
    var pre = sTotals[s] > 0 ? sTotals[s] / vatFactor : 0;
    tfootPreVat += '<td style="' + preVatStyle + '">' + (pre>0?ILS(pre):'—') + '</td>';
  });
  tfootPreVat += '<td style="' + preVatStyle + '"><strong>' + (grandTotal>0?ILS(grandTotal/vatFactor):'—') + '</strong></td>';

  cont.innerHTML =
    '<div class="table-wrap"><table>' +
      '<thead><tr>' + theadCells + '</tr></thead>' +
      '<tbody>' + tbody + '</tbody>' +
      '<tfoot>' +
        '<tr class="tr-total">' + tfootCells + '</tr>' +
        '<tr>' + tfootPreVat + '</tr>' +
      '</tfoot>' +
    '</table></div>' +
    '<div style="margin-top:10px;font-size:12.5px;color:var(--text-muted)">💡 סכומים הם כולל מע"מ · שורת "ללא מע"מ" מחושבת אוטומטית לפי ' + vat + '%</div>';
}

function onPurInput(inp) {
  var ds  = inp.dataset.pds;
  var sup = inp.dataset.psup;
  var ym  = ds.slice(0, 7);
  if (!S.purchases[ym]) S.purchases[ym] = {};
  if (!S.purchases[ym][ds]) S.purchases[ym][ds] = {};
  S.purchases[ym][ds][sup] = toNum(inp.value);
  persist();

  var rec = S.purchases[ym][ds];
  var rt  = 0;
  S.suppliers.forEach(function(s){ rt += toNum(rec[s]); });
  var rtEl = document.querySelector('[data-prt="' + ds + '"]');
  if (rtEl) rtEl.innerHTML = '<strong style="color:' + (rt>0?'var(--success)':'var(--text-muted)') + '">' + (rt>0?ILS(rt):'—') + '</strong>';

  var days = daysInMonth(ym);
  var ct = 0;
  for (var d2 = 1; d2 <= days; d2++) ct += toNum((S.purchases[ym][dateFull(ym,d2)] || {})[sup]);
  var ctEl = document.querySelector('[data-stot="' + sup + '"]');
  if (ctEl) ctEl.innerHTML = '<strong>' + (ct>0?ILS(ct):'—') + '</strong>';

  var grand = 0;
  S.suppliers.forEach(function(s){
    for (var d3=1; d3<=days; d3++) grand += toNum((S.purchases[ym][dateFull(ym,d3)] || {})[s]);
  });
  var gEl = document.getElementById('pur-grand');
  if (gEl) gEl.innerHTML = '<strong style="color:var(--primary);font-size:15px">' + ILS(grand) + '</strong>';
}

function getZBreakdown(ym) {
  var days = daysInMonth(ym);
  var t = {cash:0, credit:0, wolt:0, hakafe:0};
  for (var d = 1; d <= days; d++) {
    var r = S.zReports[dateFull(ym,d)] || {};
    t.cash   += toNum(r.cash);
    t.credit += toNum(r.credit);
    t.wolt   += toNum(r.wolt);
    t.hakafe += toNum(r.hakafe);
  }
  return t;
}

function getPayrollTotal(ym) {
  var emps    = S.employees.filter(function(e){ return e.active; });
  var tipsRpt = getDetailedSupplementReport(ym);
  return emps.reduce(function(s, e) {
    var sal   = calcSalary(e, aggregateMonth(e.id, ym)).total;
    var suppl = (tipsRpt[e.id] || {}).totalSuppl || 0;
    return s + sal + suppl;
  }, 0);
}

function getPurchasesTotal(ym) {
  var pur = S.purchases[ym] || {};
  var t = 0;
  Object.values(pur).forEach(function(d){
    S.suppliers.forEach(function(s){ t += toNum(d[s]); });
  });
  return t;
}

function saveControlAndRefresh() { saveControl(); renderControl(); }
function saveControl() {
  var ym = document.getElementById('ctrl-month').value;
  if (!S.control[ym]) S.control[ym] = {};
  getFixedExp().forEach(function(e){
    var el = document.getElementById('ce-' + e.k);
    if (el) S.control[ym][e.k] = toNum(el.value);
  });
  var noVatFixed = [];
  getFixedExp().forEach(function(e){
    var nvEl = document.getElementById('nvf-' + e.k);
    if (nvEl && nvEl.checked) noVatFixed.push(e.k);
  });
  S.control[ym].noVatFixed = noVatFixed;
  var extras = [];
  var i = 0;
  while (document.getElementById('ex-n-' + i)) {
    var name    = document.getElementById('ex-n-' + i).value.trim();
    var amount  = toNum(document.getElementById('ex-a-' + i).value);
    var nvxEl   = document.getElementById('nvx-' + i);
    var noVat   = !!(nvxEl && nvxEl.checked);
    if (name) extras.push({name:name, amount:amount, noVat:noVat});
    i++;
  }
  S.control[ym].extras = extras;
  persist();
}

function _emojiForExpense(name) {

  var rules = [

function addFixedCat() {
  var nameEl = document.getElementById('new-fixed-name');
  if (!nameEl) return;
  var raw = (nameEl.value || '').trim();
  if (!raw) { toast('הקלד שם להוצאה קבועה', 'err'); return; }
  if (!S.settings) S.settings = {};
  if (!S.settings.fixedCats) S.settings.fixedCats = getFixedExp().slice();
  var k = 'custom_' + Date.now();
  S.settings.fixedCats.push({ k: k, l: _emojiForExpense(raw) + ' ' + raw });
  persist();
  nameEl.value = '';
  renderControl();
  toast('✅ קטגוריה נוספה');
}

function removeFixedCat(key) {
  saveControl();
  if (!S.settings) S.settings = {};
  if (!S.settings.fixedCats) S.settings.fixedCats = getFixedExp().slice();
  S.settings.fixedCats = S.settings.fixedCats.filter(function(e){ return e.k !== key; });
  persist();
  renderControl();
  toast('קטגוריה הוסרה');
}


function addExtra() {
  saveControl();
  var ym = document.getElementById('ctrl-month').value;
  if (!S.control[ym]) S.control[ym] = {};
  if (!S.control[ym].extras) S.control[ym].extras = [];
  S.control[ym].extras.push({name:'', amount:0});
  persist();
  renderControl();
}

function removeExtra(i) {
  var ym = document.getElementById('ctrl-month').value;
  saveControl();
  if (S.control[ym] && S.control[ym].extras) S.control[ym].extras.splice(i, 1);
  persist();
  renderControl();
}

function saveVat(val) {
  if (!S.settings) S.settings = {vat:17};
  S.settings.vat = toNum(val) || 17;
  persist();
  renderControl();
}

function toggleFCMode() {

function xlxCheck() {
  if (typeof XLSX === 'undefined') {
    alert('ייצוא Excel דורש חיבור לאינטרנט. אנא בדוק את החיבור ונסה שוב.');
    return false;
  }
  return true;
}

function exportPayroll() {
  if (!xlxCheck()) return;
  var ym    = document.getElementById('payroll-month').value;
  var parts = ym.split('-');
  var mn    = MHE[parseInt(parts[1])-1] + ' ' + parts[0];
  var emps  = S.employees.filter(function(e){ return e.active; });
  var fmtD  = function(ds) { if (!ds) return ''; var p=ds.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };

  // Sheet 1 — summary
  var tipsRptXl = getDetailedSupplementReport(ym);
  var data = [
    ['דוח משכורות — ' + mn],
    [],
    ['שם עובד','סוג','שעות','שכר בסיס','ש"נ','נסיעות','תוספת','תאריך תוספת','סיבת תוספת','מפרעה','תאריך מפרעה','השלמת טיפים','הערות','סה"כ לתשלום']
  ];
  var grand = 0;
  emps.forEach(function(emp) {
    var agg     = aggregateMonth(emp.id, ym);
    var s       = calcSalary(emp, agg);
    var monthly = (S.monthlyData[ym] || {})[emp.id] || {};
    var suppl   = (tipsRptXl[emp.id] || {}).totalSuppl || 0;
    var total   = s.total + suppl;
    grand += total;
    data.push([
      emp.name,
      emp.type === 'hourly' ? 'שעתי' : 'חודשי',
      +s.hours.toFixed(2),
      +s.base.toFixed(2),
      +(s.ot125 + s.ot150).toFixed(2),
      +s.travel.toFixed(2),
      s.bonus > 0  ? +s.bonus.toFixed(2)        : '',
      s.bonus > 0  ? fmtD(monthly.bonusDate)    : '',
      s.bonus > 0  ? (monthly.bonusNote || '')   : '',
      s.advance > 0 ? +s.advance.toFixed(2)     : '',
      s.advance > 0 ? fmtD(monthly.advanceDate) : '',
      suppl > 0 ? +suppl.toFixed(2) : '',
      monthly.notes || '',
      +total.toFixed(2)
    ]);
  });
  data.push([], ['', '', '', '', '', '', '', '', '', '', '', 'סה"כ:', +grand.toFixed(2)]);

  // Sheet 2 — per-employee detail
  var detail = [['פירוט עובדים — ' + mn], []];
  emps.forEach(function(emp) {
    var agg     = aggregateMonth(emp.id, ym);
    var s       = calcSalary(emp, agg);
    var monthly = (S.monthlyData[ym] || {})[emp.id] || {};
    var supplD  = (tipsRptXl[emp.id] || {}).totalSuppl || 0;
    detail.push([emp.name]);
    detail.push(['סוג שכר', emp.type === 'hourly' ? 'שעתי' : 'חודשי']);
    detail.push(['תעריף', emp.type === 'hourly' ? emp.hourlyRate : emp.monthlySalary]);
    detail.push(['ימי עבודה', agg.workDays || 0]);
    detail.push(['שעות רגילות', +agg.regHours.toFixed(2)]);
    if (agg.ot125 > 0)  detail.push(['ש"נ 125%', +agg.ot125.toFixed(2)]);
    if (agg.ot150 > 0)  detail.push(['ש"נ 150%', +agg.ot150.toFixed(2)]);
    if (agg.travelDays) detail.push(['ימי נסיעה', agg.travelDays]);
    detail.push(['שכר בסיס', +s.base.toFixed(2)]);
    if (s.ot125 > 0) detail.push(['תוספת ש"נ 125%', +s.ot125.toFixed(2)]);
    if (s.ot150 > 0) detail.push(['תוספת ש"נ 150%', +s.ot150.toFixed(2)]);
    if (s.travel > 0) detail.push(['נסיעות', +s.travel.toFixed(2)]);
    if (s.bonus > 0)  {
      detail.push(['תוספת' + (monthly.bonusDate ? ' (' + fmtD(monthly.bonusDate) + ')' : ''), +s.bonus.toFixed(2)]);
      if (monthly.bonusNote) detail.push(['סיבת תוספת', monthly.bonusNote]);
    }
    if (s.advance > 0) detail.push(['מפרעה (ניכוי)' + (monthly.advanceDate ? ' (' + fmtD(monthly.advanceDate) + ')' : ''), -s.advance]);
    if (supplD > 0)    detail.push(['השלמת טיפים', +supplD.toFixed(2)]);
    if (monthly.notes) detail.push(['הערות', monthly.notes]);
    detail.push(['סה"כ לתשלום', +(s.total + supplD).toFixed(2)]);
    detail.push([]);
  });

  var ws1 = XLSX.utils.aoa_to_sheet(data);
  var ws2 = XLSX.utils.aoa_to_sheet(detail);
  var wb  = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, 'סיכום משכורות');
  XLSX.utils.book_append_sheet(wb, ws2, 'פירוט עובדים');
  XLSX.writeFile(wb, 'משכורות_' + parts[0] + '_' + parts[1] + '.xlsx');
}

function exportZ() {
  if (!xlxCheck()) return;
  var ym      = document.getElementById('z-month').value;
  var parts   = ym.split('-');
  var mn      = MHE[parseInt(parts[1])-1] + ' ' + parts[0];
  var days    = daysInMonth(ym);
  var vat     = toNum((S.settings || {}).vat) || 17;
  var vatF    = 1 + vat / 100;
  var data    = [['דוח Z — ' + mn], [],
    ['תאריך','יום','מזומן','אשראי','וולט','הקפה','סה"כ יומי (עם מע"מ)','סה"כ יומי (ללא מע"מ)']];
  var t = [0,0,0,0];
  for (var d = 1; d <= days; d++) {
    var ds  = dateFull(ym, d);
    var r   = S.zReports[ds] || {};
    var vv  = [toNum(r.cash),toNum(r.credit),toNum(r.wolt),toNum(r.hakafe)];
    vv.forEach(function(x,i){ t[i] += x; });
    var dt  = vv.reduce(function(a,b){return a+b;},0);
    data.push([ds, DHE[getDow(ds)]].concat(vv).concat([dt, +(dt/vatF).toFixed(2)]));
  }
  var gt = t.reduce(function(a,b){return a+b;},0);
  data.push([], ['סה"כ חודשי (עם מע"מ)',''].concat(t).concat([gt, +(gt/vatF).toFixed(2)]));
  data.push(['סה"כ חודשי (ללא מע"מ ' + vat + '%)',''].concat(t.map(function(v){return +(v/vatF).toFixed(2);})).concat([+(gt/vatF).toFixed(2),'']));
  var ws = XLSX.utils.aoa_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, mn);
  XLSX.writeFile(wb, 'דוח_Z_' + parts[0] + '_' + parts[1] + '.xlsx');
}

  if (!xlxCheck()) return;
  var ym    = document.getElementById('tips-month').value;
  var parts  = ym.split('-');
  var mn     = MHE[parseInt(parts[1])-1] + ' ' + parts[0];
  var days   = daysInMonth(ym);
  var defs2  = getShiftDefs();
  var hdrRow = ['תאריך','יום'];
  defs2.forEach(function(def){ hdrRow.push(def.name+' כסף', def.name+' שעות', def.name+' עובדים'); });
  hdrRow.push('סה"כ יומי');
  var data = [['דוח טיפים — ' + mn], [], hdrRow];
  var defTotals = {};
  defs2.forEach(function(def){ defTotals[def.id] = 0; });
  for (var d = 1; d <= days; d++) {
    var ds  = dateFull(ym, d);
    var row = [ds, DHE[getDow(ds)]];
    var dayT = 0;
    defs2.forEach(function(def) {
      var rec  = getTipRec(ds, def.id);
      var hrs  = rec.workers.reduce(function(s,w){ return s + timeDiff(w.from,w.to); }, 0);
      var nms  = rec.workers.map(function(w){ var e = S.employees.find(function(x){return x.id===w.empId;}); return e?e.name:w.empId; }).join(', ');
      defTotals[def.id] += rec.amount;
      dayT += rec.amount;
      row.push(rec.amount, hrs.toFixed(1), nms);
    });
    row.push(dayT);
    data.push(row);
  }
  var totRow = ['סה"כ חודשי',''];
  defs2.forEach(function(def){ totRow.push(defTotals[def.id],'',''); });
  var grandT = defs2.reduce(function(s,def){ return s + defTotals[def.id]; }, 0);
  totRow.push(grandT);
  data.push([], totRow);
  var ws = XLSX.utils.aoa_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, mn);
  XLSX.writeFile(wb, 'טיפים_' + parts[0] + '_' + parts[1] + '.xlsx');
}

function exportEmpDetailXlsx(empId, ym, showTips) {
  if (!xlxCheck()) return;
  var emp = S.employees.find(function(e){ return e.id === empId; });
  if (!emp) return;
  var rec     = aggregateMonth(empId, ym);
  var s       = calcSalary(emp, rec);
  var monthly = (S.monthlyData[ym] || {})[empId] || {};
  var tips    = getEmpTipsForMonth(empId, ym);
  var suppl   = (getDetailedSupplementReport(ym)[empId] || {}).totalSuppl || 0;
  var parts   = ym.split('-');
  var mn      = MHE[parseInt(parts[1])-1] + ' ' + parts[0];
  var fmtDate = function(ds) { if (!ds) return ''; var p=ds.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };

  var data = [
    ['פירוט שכר — ' + emp.name + ' — ' + mn],
    [],
    ['סוג שכר', emp.type === 'hourly' ? 'שעתי' : 'חודשי'],
    ['תעריף', emp.type === 'hourly' ? emp.hourlyRate : emp.monthlySalary],
    [],
    ['ימי עבודה', rec.workDays],
    ['שעות רגילות', +rec.regHours.toFixed(2)],
    ['ש"נ 125%', +rec.ot125.toFixed(2)],
    ['ש"נ 150%', +rec.ot150.toFixed(2)],
    ['ימי נסיעה', rec.travelDays],
    [],
    ['שכר בסיס', +s.base.toFixed(2)],
    ['ש"נ 125%', +s.ot125.toFixed(2)],
    ['ש"נ 150%', +s.ot150.toFixed(2)],
    ['נסיעות', +s.travel.toFixed(2)],
    ['תוספת' + (monthly.bonusDate ? ' (' + fmtDate(monthly.bonusDate) + ')' : ''), +s.bonus.toFixed(2)],
    (monthly.bonusNote ? ['סיבת תוספת', monthly.bonusNote] : ['','']),
    ['מפרעה (ניכוי)' + (monthly.advanceDate ? ' (' + fmtDate(monthly.advanceDate) + ')' : ''), -s.advance],
    [],
    ['שכר לתשלום', +s.total.toFixed(2)]
  ];
  if (suppl > 0) {
    data.push(['השלמת טיפים (מינימום)', +suppl.toFixed(2)]);
    data.push(['סה"כ למשכורת (שכר + השלמה)', +(s.total + suppl).toFixed(2)]);
  }
  if (showTips) {
    data.push(['טיפים חודש', +tips.toFixed(2)]);
    data.push(['סה"כ הכנסה (שכר + השלמה + טיפים)', +(s.total + suppl + tips).toFixed(2)]);
  }

  var dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  var dInM = daysInMonth(ym);
  var hasDays = false;
  var dayData = [[], ['פירוט ימי עבודה'], ['תאריך','יום','שעות רגילות','ש"נ 125','ש"נ 150','סה"כ שעות','תשלום יומי ₪']];
  for (var d = 1; d <= dInM; d++) {
    var ds2 = dateFull(ym, d);
    var dr = (S.dailyHours[ds2] || {})[empId] || {};
    var rH = toNum(dr.regHours), o1 = toNum(dr.ot125), o2 = toNum(dr.ot150);
    var tot2 = rH + o1 + o2;
    if (!tot2) continue;
    hasDays = true;
    var wd2 = getDow(ds2);
    var pay = emp.type === 'hourly'
      ? rH * emp.hourlyRate + o1 * emp.hourlyRate * 1.25 + o2 * emp.hourlyRate * 1.5
      : (rH + o1 * 1.25 + o2 * 1.5) * (toNum(emp.monthlySalary) / 182);
    dayData.push([ds2, dayNames[wd2], rH||0, o1||0, o2||0, tot2, +pay.toFixed(2)]);
  }
  if (hasDays) data = data.concat(dayData);

  var ws = XLSX.utils.aoa_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'שכר');
  XLSX.writeFile(wb, 'שכר_' + emp.name + '_' + ym + '.xlsx');
}

function exportPurchases() {

  var ym    = document.getElementById('pur-month').value;
  var parts = ym.split('-');
  var mn    = MHE[parseInt(parts[1])-1] + ' ' + parts[0];

  var days  = daysInMonth(ym);
  var pur   = S.purchases[ym] || {};
  var data  = [['קניות ספקים — ' + mn], [], ['יום'].concat(sups).concat(['סה"כ יומי'])];
  var st    = new Array(sups.length).fill(0);

  XLSX.utils.book_append_sheet(wb, ws, mn);
  XLSX.writeFile(wb, 'קניות_' + parts[0] + '_' + parts[1] + '.xlsx');
}

/* ================================================================
   BACKUP / RESTORE  — File System Access API
================================================================ */

function _idbBackupDir(mode, handle) {
  return new Promise(function(resolve) {
    var req = indexedDB.open('cafeManagerFS', 1);
    req.onupgradeneeded = function(e) { e.target.result.createObjectStore('handles'); };
    req.onsuccess = function(e) {
      var db    = e.target.result;
      var tx    = db.transaction('handles', mode === 'write' ? 'readwrite' : 'readonly');
      var store = tx.objectStore('handles');
      if (mode === 'write') {
        store.put(handle, 'backupDir');
        tx.oncomplete = function() { resolve(true); };
        tx.onerror    = function() { resolve(false); };
      } else {
        var g = store.get('backupDir');
        g.onsuccess = function() { resolve(g.result || null); };
        g.onerror   = function() { resolve(null); };
      }
    };
    req.onerror = function() { resolve(null); };
  });
}

async function _getBackupDir() {
  var h = await _idbBackupDir('read');
  if (!h) return null;
  try {
    var p = await h.queryPermission({ mode: 'readwrite' });
    if (p === 'granted') return h;
    var p2 = await h.requestPermission({ mode: 'readwrite' });
    if (p2 === 'granted') return h;
  } catch(e) {}
  return null;
}

async function exportBackup() {
  var d        = new Date();
  var ts       = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '_' + String(d.getHours()).padStart(2,'0') + '-' + String(d.getMinutes()).padStart(2,'0');
  var filename = 'גיבוי-' + ts + '.json';
  var data     = JSON.stringify(S, null, 2);

  if (window.showDirectoryPicker) {
    try {
      var dirHandle = await _getBackupDir();
      if (!dirHandle) {
        toast('📁 בחר תיקייה לשמירת הגיבויים (פעם אחת בלבד)', 'ok');
        dirHandle = await window.showDirectoryPicker({ id: 'cafe-backups', mode: 'readwrite', startIn: 'desktop' });
        await _idbBackupDir('write', dirHandle);
      }
      var fh  = await dirHandle.getFileHandle(filename, { create: true });
      var wr  = await fh.createWritable();
      await wr.write('﻿' + data);
      await wr.close();
      localStorage.setItem('cafeManager_lastBackup', new Date().toISOString());
      dismissBanner();
      toast('✅ גיבוי נשמר אוטומטית: ' + filename, 'ok');
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }

  // Fallback: regular download
  try {
    var blob = new Blob(['﻿' + data], {type: 'application/json;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem('cafeManager_lastBackup', new Date().toISOString());
    dismissBanner();
    toast('✅ גיבוי יצא בהצלחה', 'ok');
  } catch(e) {
    toast('שגיאה בגיבוי: ' + e.message, 'err');
  }
}

async function triggerImport() {
  if (window.showDirectoryPicker) {
    var dirHandle = await _getBackupDir();
    if (dirHandle) {
      try {
        var files = [];
        for await (var entry of dirHandle.values()) {
          if (entry.kind === 'file' && entry.name.endsWith('.json')) files.push(entry);
        }
        files.sort(function(a, b) { return b.name.localeCompare(a.name); });
        if (files.length > 0) { showRestoreModal(files); return; }
        toast('תיקיית הגיבויים ריקה — בחר קובץ ידנית', 'ok');
      } catch(e) {}
    }
  }
  document.getElementById('backup-file-input').click();
}

async function doRestore(fileEntry) {
  if (!confirm('⚠️ שחזור גיבוי\n\nהפעולה תחליף את כל הנתונים הקיימים.\nהאם להמשיך?')) return;
  var modal = document.getElementById('restore-modal');
  if (modal) modal.remove();
  try {
    var file = await fileEntry.getFile();
    var raw  = await file.text();
    if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
    var data = JSON.parse(raw);
    if (!data || !Array.isArray(data.employees)) { toast('קובץ גיבוי לא תקין', 'err'); return; }
    ['roles','dailyHours','monthlyData','timeRecords','zReports','tips','suppliers','purchases','control','settings'].forEach(function(k) {
      if (!data[k]) data[k] = S[k];
    });
    S = data; persist();
    toast('✅ גיבוי יובא — טוען מחדש...', 'ok');
    setTimeout(function() { location.reload(); }, 900);
  } catch(e) {
    toast('שגיאה בשחזור: ' + e.message, 'err');
  }
}

function handleImport(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var raw = e.target.result;
      if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
      var data = JSON.parse(raw);
      if (!data || typeof data !== 'object' || !Array.isArray(data.employees)) {
        toast('קובץ גיבוי לא תקין', 'err');
        input.value = '';
        return;
      }
      if (!confirm('⚠️ ייבוא גיבוי\n\nהפעולה תחליף את כל הנתונים הקיימים.\nהאם להמשיך?')) {
        input.value = '';
        return;
      }
      ['roles','dailyHours','monthlyData','timeRecords','zReports','tips','suppliers','purchases','control','settings'].forEach(function(k) {
        if (!data[k]) data[k] = S[k];
      });
      S = data;
      persist();
      input.value = '';
      toast('✅ גיבוי יובא — טוען מחדש...', 'ok');
      setTimeout(function() { location.reload(); }, 900);
    } catch(err) {
      toast('שגיאה בקריאת הקובץ', 'err');
      input.value = '';
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function loadDemoData() {
  if (S.employees.length > 0) {
    if (!confirm('⚠️ טעינת נתוני דוגמה תמחק את כל הנתונים הנוכחיים.\nהאם להמשיך?')) return;
  }

  var today  = new Date();
  var curY   = today.getFullYear();
  var curM   = today.getMonth() + 1;
  var prevM  = curM === 1 ? 12 : curM - 1;
  var prevY  = curM === 1 ? curY - 1 : curY;
  var curYM  = curY  + '-' + String(curM).padStart(2,'0');
  var prevYM = prevY + '-' + String(prevM).padStart(2,'0');
  var curDay = today.getDate();

  var emps = [
    {id:'demo1', name:'שרה לוי',      type:'monthly', num:'123456789', phone:'050-1234567', hourlyRate:0,  monthlySalary:14000, travelPerDay:22, roles:['מנהלת'],  role:'מנהלת',  active:true},
    {id:'demo2', name:'דני כהן',       type:'hourly',  num:'234567890', phone:'052-2345678', hourlyRate:37, monthlySalary:0,     travelPerDay:22, roles:['מלצר'],   role:'מלצר',   active:true},
    {id:'demo3', name:'רחל מזרחי',     type:'hourly',  num:'345678901', phone:'054-3456789', hourlyRate:34, monthlySalary:0,     travelPerDay:18, roles:['מלצרית'], role:'מלצרית', active:true},
    {id:'demo4', name:'יוסי אברהם',    type:'hourly',  num:'456789012', phone:'058-4567890', hourlyRate:42, monthlySalary:0,     travelPerDay:25, roles:['ברמן'],   role:'ברמן',   active:true},
    {id:'demo5', name:'תמר גרינברג',   type:'hourly',  num:'567890123', phone:'050-5678901', hourlyRate:33, monthlySalary:0,     travelPerDay:18, roles:['קופאית'], role:'קופאית', active:true}
  ];

  var roles = ['מנהלת','מלצר','מלצרית','ברמן','קופאית'];

  function dStr(y,m,d) { return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }
  function dow(y,m,d)  { return new Date(y, m-1, d).getDay(); }
  function daysIn(y,m) { return new Date(y, m, 0).getDate(); }
  function rnd(min,max) { return Math.round(min + Math.random() * (max - min)); }

  var dailyHours = {};
  function addHrs(ds, empId, reg, ot1, ot2) {
    if (!dailyHours[ds]) dailyHours[ds] = {};
    dailyHours[ds][empId] = {regHours: reg, ot125: ot1||0, ot150: ot2||0};
  }

  function genMonthHours(y, m, maxDay) {
    var days = Math.min(daysIn(y, m), maxDay || 999);
    for (var d = 1; d <= days; d++) {
      var wd = dow(y, m, d);
      if (wd === 6) continue;
      var ds = dStr(y, m, d);
      var isFri = wd === 5;
      if (!isFri) addHrs(ds, 'demo1', 9, wd===1?1:0, 0);
      if (wd <= 4)        addHrs(ds, 'demo2', 8, (wd===0||wd===3)?1:0, 0);
      if (wd <= 4 && d%2===0) addHrs(ds, 'demo3', 8, 0, 0);
      if (isFri)          addHrs(ds, 'demo3', 6, 0, 0);
      if (wd >= 3 && wd <= 5) addHrs(ds, 'demo4', 8, 1, 0);
      if (wd <= 4 && d%3!==0) addHrs(ds, 'demo5', 8, 0, 0);
    }
  }

  genMonthHours(prevY, prevM);
  genMonthHours(curY,  curM, curDay);

  var zReports = {};
  function genZMonth(y, m, maxDay) {
    var days = Math.min(daysIn(y, m), maxDay || 999);
    for (var d = 1; d <= days; d++) {
      var wd = dow(y, m, d);
      if (wd === 6) continue;
      var ds = dStr(y, m, d);
      var mult = wd === 5 ? 1.45 : 1;
      zReports[ds] = {
        cash:   rnd(1800, 2800) * mult | 0,
        credit: rnd(2300, 3800) * mult | 0,
        wolt:   rnd(600,  1300) * mult | 0,
        hakafe: rnd(0, 180) * mult | 0
      };
    }
  }
  genZMonth(prevY, prevM);
  genZMonth(curY,  curM, curDay - 1);

  var suppliers = ['תנובה', 'מסד', 'קוקה קולה'];

  var purchases = {};
  function genPurchases(ym2, y, m, maxDay) {
    purchases[ym2] = {};
    var datesM = [5, 10, 15, 20, 25].filter(function(d){ return d <= (maxDay||daysIn(y,m)); });
    datesM.forEach(function(d) {
      var ds = dStr(y, m, d);
      purchases[ym2][ds] = {'תנובה': rnd(650,1100), 'מסד': rnd(450,800), 'קוקה קולה': rnd(300,550)};
    });
  }
  genPurchases(prevYM, prevY, prevM);
  genPurchases(curYM,  curY,  curM, curDay - 1);

  var control = {};
  control[prevYM] = {rent:8500, propTax:1200, mgmt:900, electric:1600, water:380, internet:220, accountant:1800, social:1400, extraExpenses:[]};

  var tips = {};
  function addTips(y, m, maxDay) {
    var days = Math.min(daysIn(y, m), maxDay || 999);
    for (var d = 1; d <= days; d++) {
      var wd = dow(y, m, d);
      if (wd === 6) continue;
      var ds = dStr(y, m, d);
      tips[ds] = {
        morning: {
          amount: rnd(180, 350),
          workers: [
            {empId:'demo2', from:'09:00', to:'17:00', adjust:0, adjustNote:''},
            {empId:'demo3', from:'08:00', to:'16:00', adjust:0, adjustNote:''}
          ]
        },
        evening: {
          amount: rnd(280, 520),
          workers: [
            {empId:'demo4', from:'16:00', to:'23:00', adjust:0, adjustNote:''},
            {empId:'demo2', from:'17:00', to:'23:00', adjust:0, adjustNote:''}
          ]
        }
      };
    }
  }
  addTips(prevY, prevM);
  addTips(curY,  curM, curDay - 1);

  var monthlyData = {};
  monthlyData[prevYM] = {demo1: {bonus:500, advance:0, bonusNote:'בונוס חודשי', sickDays:0, vacDays:2, notes:''}};
  monthlyData[curYM]  = {};

  S = {
    employees:   emps,
    roles:       roles,
    dailyHours:  dailyHours,
    monthlyData: monthlyData,
    timeRecords: {},
    zReports:    zReports,
    tips:        tips,
    suppliers:   suppliers,
    purchases:   purchases,
    control:     control,
    settings:    {vat:17, tipsMinPerHr:35, adjNotes:[], shiftDefs: S.settings && S.settings.shiftDefs ? S.settings.shiftDefs : null}
  };
  if (!S.settings.shiftDefs) delete S.settings.shiftDefs;

  persist();
  toast('✅ נתוני דוגמה נטענו — טוען מחדש...', 'ok');
  setTimeout(function() { location.reload(); }, 700);
}

var AUTH_HASH_KEY = 'cafeManager_pwHash';
var AUTH_SESS_KEY = 'cafeManager_authed';

function _hashPw(pw) {
  var s = 'cafe_biz_' + pw + '_mgr';
  var h = 5381;
  for (var i = 0; i < s.length; i++) {
    h = ((h << 5) + h) ^ s.charCodeAt(i);
    h = h >>> 0;
  }
  return h.toString(16) + '_' + s.length.toString(16);
}

function authInit() {

  var authed = sessionStorage.getItem(AUTH_SESS_KEY);

    setTimeout(function() { document.getElementById('auth-pw').focus(); }, 100);
  } else {

}

  var hash = localStorage.getItem(AUTH_HASH_KEY);
  var pw   = document.getElementById('auth-pw').value;
  var err  = document.getElementById('auth-err');
  if (!pw) { err.textContent = 'נא להזין סיסמה'; return; }
  if (!hash) {
    // Setup mode
    var pw2 = document.getElementById('auth-pw2').value;
    if (pw.length < 4) { err.textContent = 'הסיסמה חייבת להיות לפחות 4 תווים'; return; }
    if (pw !== pw2) { err.textContent = 'הסיסמאות אינן תואמות'; return; }
    localStorage.setItem(AUTH_HASH_KEY, _hashPw(pw));
    sessionStorage.setItem(AUTH_SESS_KEY, '1');
    authShowApp();
  } else {
    // Login mode
    if (_hashPw(pw) === hash) {
      sessionStorage.setItem(AUTH_SESS_KEY, '1');
      authShowApp();
    } else {
      err.textContent = 'סיסמה שגויה — נסה שוב';
      document.getElementById('auth-pw').value = '';
      document.getElementById('auth-pw').focus();
    }
  }
}

var SYNC_TOKEN_KEY = 'cafeManager_ghSync';
var _syncTimer = null;
var _syncStatus = 'idle'; // idle | syncing | ok | err

function scheduleSync() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushToCloud, 20000);
}

function pushToCloud() {
  var token = localStorage.getItem(SYNC_TOKEN_KEY);
  if (!token) return;
  setSyncStatus('syncing');
  var data   = JSON.stringify(S, null, 2);
  var bytes  = unescape(encodeURIComponent(data));
  var base64 = btoa(bytes);
  var headers = { 'Authorization': 'token ' + token, 'User-Agent': 'cafe-sync', 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };
  var apiUrl  = 'https://api.github.com/repos/maromezra5-glitch/Business-manager/contents/cafe-data.json';

  function doUpload(sha) {
    var body = JSON.stringify({ message: 'sync ' + new Date().toISOString(), content: base64, branch: 'main' });
    if (sha) body = JSON.stringify({ message: 'sync ' + new Date().toISOString(), content: base64, sha: sha, branch: 'main' });
    var xhr = new XMLHttpRequest();
    xhr.open('PUT', apiUrl, true);
    Object.keys(headers).forEach(function(k) { xhr.setRequestHeader(k, headers[k]); });
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        setSyncStatus('ok');
        localStorage.setItem('cafeManager_lastSync', new Date().toISOString());
      } else { setSyncStatus('err'); }
    };
    xhr.onerror = function() { setSyncStatus('err'); };
    xhr.send(body);
  }

  var xhrGet = new XMLHttpRequest();
  xhrGet.open('GET', apiUrl, true);
  Object.keys(headers).forEach(function(k) { xhrGet.setRequestHeader(k, headers[k]); });
  xhrGet.onload = function() {
    var sha = null;
    if (xhrGet.status === 200) {
      try { sha = JSON.parse(xhrGet.responseText).sha; } catch(e) {}
    }
    doUpload(sha);
  };
  xhrGet.onerror = function() { doUpload(null); };
  xhrGet.send();
}

function pullFromCloud(token, onDone) {
  var apiUrl = 'https://api.github.com/repos/maromezra5-glitch/Business-manager/contents/cafe-data.json';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', apiUrl, true);
  xhr.setRequestHeader('Authorization', 'token ' + token);
  xhr.setRequestHeader('User-Agent', 'cafe-sync');
  xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var b64  = JSON.parse(xhr.responseText).content.replace(/\n/g, '');
        var raw  = decodeURIComponent(escape(atob(b64)));
        var data = JSON.parse(raw);
        if (data && Array.isArray(data.employees)) { onDone(null, data); return; }
      } catch(e) {}
    }
    onDone('לא נמצא גיבוי בענן');
  };
  xhr.onerror = function() { onDone('שגיאת רשת'); };
  xhr.send();
}

function setSyncStatus(s) {
  _syncStatus = s;
  var lbl = document.getElementById('sync-label');
  var btn = document.getElementById('sync-btn');
  if (!lbl) return;
  if (s === 'syncing') { lbl.textContent = 'מסנכרן...'; btn.style.color = '#C87D0E'; }
  else if (s === 'ok')   { lbl.textContent = 'מסונכרן ✓'; btn.style.color = '#1E7D4B'; }
  else if (s === 'err')  { lbl.textContent = 'שגיאת ענן'; btn.style.color = '#C0392B'; }
  else                   { lbl.textContent = 'ענן'; btn.style.color = ''; }
}

function fetchBizAuto() {
  var url = (document.getElementById('biz-url-inp').value || '').trim();
  if (!url) { toast('הכנס כתובת אתר', 'err'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  var domain = url.replace(/^https?:\/\//i, '').replace(/^www\./i, '').split('/')[0];

  var logoStatus = document.getElementById('biz-logo-status');
  var bgStatus   = document.getElementById('biz-bg-status');
  logoStatus.textContent = '🔍 מחפש לוגו...';
  bgStatus.textContent   = '🔍 מחפש תמונת רקע...';

  // לוגו — Clearbit → Google favicon fallback
  var clearbit = 'https://logo.clearbit.com/' + domain;
  var logoImg = new Image();
  logoImg.onload = function() {
    _setBizLogoPreview(clearbit);
    logoStatus.textContent = '✅ לוגו נמצא!';
  };
  logoImg.onerror = function() {
    var fallback = 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=128';
    _setBizLogoPreview(fallback);
    logoStatus.textContent = '✅ נמצא סמל אתר';
  };
  logoImg.src = clearbit;

  // תמונת רקע — נסה לטעון og:image דרך פרוקסי CORS ציבורי
  var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
  fetch(proxyUrl, { signal: AbortSignal.timeout ? AbortSignal.timeout(8000) : undefined })
    .then(function(r) { return r.text(); })
    .then(function(html) {
      var match = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
      if (match && match[1]) {
        var imgSrc = match[1];
        if (!/^https?:\/\//i.test(imgSrc)) imgSrc = 'https://' + domain + (imgSrc.charAt(0)==='/' ? '' : '/') + imgSrc;
        _setBizBgPreview(imgSrc);
        bgStatus.textContent = '✅ תמונת רקע נמצאה!';
      } else {
        bgStatus.textContent = 'לא נמצאה תמונת רקע — אפשר להעלות ידנית';
      }
    })
    .catch(function() {
      bgStatus.textContent = 'לא ניתן לאחזר — אפשר להעלות ידנית';
    });
}

function handleBgUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX = 1400;
      var w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var compressed = canvas.toDataURL('image/jpeg', 0.72);
      _setBizBgPreview(compressed);
      var kb = Math.round(compressed.length * 0.75 / 1024);
      document.getElementById('biz-bg-status').textContent = '✅ תמונה הועלתה (' + kb + ' KB)';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

</script>
