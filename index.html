<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנהל העסק</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #D97757;
  --primary-dark: #B85E3E;
  --primary-light: #F5E6DF;
  --bg: #EAE3DC;
  --surface: #FFFFFF;
  --border: #E2DAD4;
  --text: #1A1514;
  --text-sec: #6B6460;
  --text-muted: #9C9490;
  --success: #1E7D4B;
  --success-bg: #E3F5ED;
  --warning: #C87D0E;
  --warning-bg: #FEF3DC;
  --error: #C0392B;
  --error-bg: #FDECEC;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 6px 22px rgba(0,0,0,.13);
  --shadow-lg: 0 14px 40px rgba(0,0,0,.18);
  --r: 14px; --r-sm: 9px; --r-xs: 5px;
  --glow-primary: 0 0 24px rgba(217,119,87,.28);
  --glow-success: 0 0 20px rgba(30,125,75,.22);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px;
  color: var(--text); direction: rtl; min-height: 100%;
  background-color: #E6DDD5;
  background-image:
    radial-gradient(ellipse at 5% 0%, rgba(217,119,87,.14) 0%, transparent 45%),
    radial-gradient(ellipse at 95% 100%, rgba(30,125,75,.08) 0%, transparent 40%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1.2' fill='%23D97757' fill-opacity='0.055'/%3E%3C/svg%3E");
}

::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #C8C0BA, #B8B0AA); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ── ANIMATIONS ── */
@keyframes slideUp    { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
@keyframes popIn      { 0%  { transform:scale(.91); opacity:0; } 100% { transform:scale(1); opacity:1; } }
@keyframes numChange  { 0%  { transform:scale(1.12) translateY(-3px); } 100% { transform:scale(1) translateY(0); } }
@keyframes shimmer    { 0%,100% { opacity:1; } 50% { opacity:.7; } }
@keyframes glowPulse  { 0%,100% { box-shadow:0 0 0 0 rgba(217,119,87,0); } 50% { box-shadow:0 0 22px 6px rgba(217,119,87,.26); } }
@keyframes liveDot    { 0%,100% { box-shadow:0 0 0 0 rgba(74,222,128,0); transform:scale(1); } 60% { box-shadow:0 0 0 5px rgba(74,222,128,0); transform:scale(1.15); } }
@keyframes floatCoffee { 0%,100% { transform:translateY(0) rotate(-2deg); } 50% { transform:translateY(-5px) rotate(2deg); } }
@keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
@keyframes gradPulse  { 0%,100% { opacity:.9; } 50% { opacity:1; } }

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, #18100D 0%, #261710 40%, #1E120E 100%);
  border-bottom: 2px solid rgba(217,119,87,.4);
  padding: 0 32px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 4px 36px rgba(0,0,0,.4), 0 1px 0 rgba(217,119,87,.25), inset 0 1px 0 rgba(255,255,255,.04);
}
.logo { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: -.4px; display: flex; align-items: center; gap: 12px; }
.logo span.accent { color: var(--primary); text-shadow: 0 0 14px rgba(217,119,87,.5); }
.logo-sub { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,.4); margin-top: 3px; letter-spacing: .3px; }
.logo-coffee { font-size: 28px; display: inline-block; animation: floatCoffee 4s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(217,119,87,.7)); }
.header-date { font-size: 13px; color: rgba(255,255,255,.55); font-weight: 600; background: rgba(255,255,255,.07); padding: 5px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1); }
.header-live { display: flex; align-items: center; gap: 6px; padding: 5px 13px; background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.2); border-radius: 20px; }
.header-live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ADE80; animation: liveDot 2.2s ease-in-out infinite; }
.header-live-txt { font-size: 12px; color: rgba(74,222,128,.85); font-weight: 700; }

/* ── TAB NAV ── */
.tab-nav {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 3px 16px rgba(0,0,0,.07);
  display: flex;
  overflow-x: auto;
  padding: 0 20px;
  position: sticky; top: 72px; z-index: 190;
  scrollbar-width: none;
  gap: 2px;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 16px 22px 14px;
  border: none; background: none; cursor: pointer;
  font-size: 14px; font-weight: 600; color: var(--text-sec);
  white-space: nowrap; border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color .16s, border-color .16s, background .16s, transform .14s;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  position: relative;
}
.tab-btn:hover { color: var(--primary); background: linear-gradient(to bottom, rgba(217,119,87,.09), rgba(217,119,87,.02)); transform: translateY(-2px); }
.tab-btn.active {
  color: var(--primary); border-bottom-color: var(--primary); font-weight: 800;
  background: linear-gradient(180deg, rgba(217,119,87,.1) 0%, rgba(217,119,87,.03) 100%);
}
.tab-btn.active .tab-icon { filter: drop-shadow(0 0 4px rgba(217,119,87,.5)); }
.tab-icon { font-size: 17px; transition: filter .16s; }

/* ── MAIN ── */
.tab-contents { padding: 28px; max-width: 1380px; width: 100%; margin: 0 auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: slideUp .22s ease; }

/* ── PANEL HEADER ── */
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; flex-wrap: wrap; gap: 14px; }
.panel-title {
  font-size: 23px; font-weight: 900; color: var(--text);
  position: relative; padding-right: 14px; display: flex; align-items: center; gap: 8px;
}
.panel-title::before {
  content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 4px; height: 26px;
  background: linear-gradient(180deg, var(--primary), var(--primary-dark));
  border-radius: 2px;
}
.panel-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ── MONTH SELECTOR ── */
.month-sel { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-sm); padding: 7px 12px; }
.month-sel label { font-size: 12px; color: var(--text-muted); white-space: nowrap; font-weight: 600; }
.month-sel select { border: none; background: none; font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer; outline: none; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 17px; border-radius: var(--r-sm);
  border: 1.5px solid transparent; cursor: pointer;
  font-size: 13.5px; font-weight: 600;
  transition: all .16s; white-space: nowrap; line-height: 1;
  position: relative; overflow: hidden;
}
.btn:active { transform: scale(.96) !important; }
.btn-primary { background: linear-gradient(135deg, #E0865F, var(--primary), var(--primary-dark)); background-size: 200% 100%; background-position: 100% 0; color: #fff; border-color: var(--primary-dark); box-shadow: 0 2px 8px rgba(217,119,87,.25); }
.btn-primary:hover { background-position: 0 0; box-shadow: 0 5px 18px rgba(217,119,87,.45); transform: translateY(-2px); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn-success { background: linear-gradient(135deg, #2ABB74, var(--success)); color: #fff; border-color: var(--success); box-shadow: 0 2px 8px rgba(30,125,75,.2); }
.btn-success:hover { box-shadow: 0 5px 18px rgba(30,125,75,.4); transform: translateY(-2px); }
.btn-danger { background: var(--surface); color: var(--error); border-color: var(--border); }
.btn-danger:hover { background: var(--error-bg); border-color: var(--error); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(192,57,43,.2); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-icon { padding: 6px 8px; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 22px; box-shadow: var(--shadow-sm); }
.card-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }

/* ── SUMMARY GRID ── */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 14px; margin-bottom: 26px; }
.s-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 18px 20px 16px; box-shadow: var(--shadow-sm);
  transition: transform .18s, box-shadow .18s;
  animation: popIn .28s ease both;
  border-top: 4px solid var(--border);
  position: relative; overflow: hidden;
}
.s-card::after { content:''; position:absolute; inset:0; background:linear-gradient(160deg,rgba(255,255,255,.7) 0%,transparent 70%); pointer-events:none; }
.s-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.s-card.accent { border-top-color: var(--primary); border-color: rgba(217,119,87,.2); background: linear-gradient(145deg,#FFF5EE,#FFE9D8,#FFF2EB); }
.s-card.green-card { border-top-color: var(--success); border-color: rgba(30,125,75,.2); background: linear-gradient(145deg,#EDFAF4,#D8F3E8,#EBF9F2); }
.s-card.blue-card { border-top-color: #2563EB; border-color: rgba(37,99,235,.18); background: linear-gradient(145deg,#EEF4FF,#DDE9FF,#F0F5FF); }
.s-card.purple-card { border-top-color: #7C3AED; border-color: rgba(124,58,237,.18); background: linear-gradient(145deg,#F5F0FF,#EDE6FF,#F8F5FF); }
.s-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
.s-value { font-size: 26px; font-weight: 900; color: var(--text); line-height: 1.1; letter-spacing: -.5px; }
.s-value.orange { color: var(--primary); }
.s-value.green { color: var(--success); }
.s-value.red { color: var(--error); }
.s-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 5px; font-weight: 600; }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 240px); border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); }
table { width: 100%; border-collapse: collapse; font-size: 14.5px; }
thead th {
  background: #F0EBE6; color: var(--text); font-weight: 800;
  font-size: 13px; text-transform: uppercase; letter-spacing: .3px;
  padding: 12px 14px; white-space: nowrap;
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 4px rgba(0,0,0,.06);
}
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 14.5px; }
tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) { background: #FAFAF8; }
tbody tr:hover { background: #F5EDE7; }
.tr-total { background: #EDE7E0 !important; }
.tr-total td { border-top: 2px solid #CFC6BE; font-weight: 700; }
.tr-shabbat td { background: #FFFBF5 !important; color: #B87020; }

/* sticky first column (RTL = right side) */
.sticky-col { position: sticky; inset-inline-start: 0; z-index: 5; background: inherit; }
thead .sticky-col { background: #F0EBE6; z-index: 11; }
.tr-total .sticky-col { background: #EDE7E0; }

/* ── TABLE INPUTS ── */
.ti { padding: 6px 8px; border: 1.5px solid var(--border); border-radius: var(--r-xs); font-size: 13.5px; text-align: center; background: #fff; transition: border-color .15s, box-shadow .15s; font-family: inherit; }
.ti:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(217,119,87,.14); }
.ti-w60 { width: 60px; }
.ti-w70 { width: 70px; }
.ti-w80 { width: 80px; }
.ti-w90 { width: 90px; }
.ti-w100 { width: 100px; }
.ti-w120 { width: 120px; }
.ti-w140 { width: 140px; }

/* ── FORMS ── */
.form-group { margin-bottom: 17px; }
.form-label { display: block; font-size: 12.5px; font-weight: 700; color: var(--text-sec); margin-bottom: 6px; }
.form-control { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: var(--r-sm); font-size: 14.5px; background: #fff; font-family: inherit; transition: border-color .15s, box-shadow .15s; }
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(217,119,87,.14); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── BADGES ── */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 700; }
.badge-hourly { background: #E8EEF8; color: #2451B3; }
.badge-monthly { background: #E6F4ED; color: #1B6B41; }

/* ── EMPLOYEE GRID ── */
.emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 16px; }
.emp-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 20px; box-shadow: var(--shadow-sm);
  transition: box-shadow .2s, transform .2s;
  animation: slideUp .28s ease both;
  border-right: 4px solid var(--primary);
  position: relative; overflow: hidden;
}
.emp-card::before { content:''; position:absolute; top:0; right:0; width:70px; height:70px; background:radial-gradient(circle at top right, rgba(217,119,87,.07) 0%, transparent 70%); pointer-events:none; }
.emp-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); border-right-color: var(--primary-dark); }
.emp-card.inactive { opacity: .55; }
.emp-card[data-type="monthly"] { border-right-color: var(--success); }
.emp-card[data-type="monthly"]::before { background: radial-gradient(circle at top right, rgba(30,125,75,.07) 0%, transparent 70%); }
.emp-avatar {
  width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  box-shadow: 0 4px 14px rgba(217,119,87,.4);
}
.emp-avatar.monthly { background: linear-gradient(135deg, #2A9A64, var(--success)); box-shadow: 0 4px 14px rgba(30,125,75,.35); }
.emp-name { font-size: 17px; font-weight: 900; margin-bottom: 3px; }
.emp-info { font-size: 13px; color: var(--text-sec); margin-bottom: 5px; display: flex; align-items: center; gap: 7px; }
.emp-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }

/* ── SUPPLIER CHIPS ── */
.chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 36px; align-items: center; }
.chip { display: flex; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary-dark); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid rgba(217,119,87,.25); }
.chip button { background: none; border: none; cursor: pointer; color: var(--primary-dark); font-size: 14px; padding: 0; line-height: 1; opacity: .7; }
.chip button:hover { opacity: 1; }
.add-row { display: flex; gap: 8px; align-items: center; }

/* ── MODAL ── */
.modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
.modal.hidden { display: none; }
.modal-bd { position: absolute; inset: 0; background: rgba(20,14,12,.55); backdrop-filter: blur(5px); }
.modal-box { position: relative; background: var(--surface); border-radius: 18px; padding: 30px; width: 90%; max-width: 560px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.5); z-index: 1; animation: popIn .22s cubic-bezier(.34,1.56,.64,1); }
.modal-title { font-size: 21px; font-weight: 900; margin-bottom: 22px; color: var(--text); padding-bottom: 14px; border-bottom: 2px solid var(--border); }
.modal-footer { display: flex; gap: 10px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); justify-content: flex-end; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1C1410; color: #fff; padding: 12px 26px; border-radius: 50px; font-size: 14px; font-weight: 700; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.07); animation: toastIn .28s cubic-bezier(.34,1.56,.64,1); pointer-events: none; white-space: nowrap; }
.toast.hidden { display: none; }
.toast.ok { background: linear-gradient(135deg, #1E7D4B, #25A060); box-shadow: 0 8px 28px rgba(30,125,75,.45); }
.toast.err { background: linear-gradient(135deg, #C0392B, #E04534); box-shadow: 0 8px 28px rgba(192,57,43,.45); }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(14px) scale(.92); } to { opacity:1; transform:translateX(-50%) translateY(0) scale(1); } }

/* ── ALERT ── */
.alert { padding: 12px 16px; border-radius: var(--r-sm); font-size: 13.5px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 9px; }
.alert-warn { background: var(--warning-bg); border: 1px solid #F0CC70; color: var(--warning); }
.alert-err  { background: var(--error-bg);   border: 1px solid #F0B0B0; color: var(--error); }
.alert-ok   { background: var(--success-bg); border: 1px solid #90D4B0; color: var(--success); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 72px 20px; color: var(--text-muted); }
.empty-icon { font-size: 58px; margin-bottom: 18px; display: block; animation: floatCoffee 4s ease-in-out infinite; }
.empty-title { font-size: 19px; font-weight: 800; margin-bottom: 8px; color: var(--text-sec); }
.empty-text { font-size: 14px; max-width: 320px; margin: 0 auto; line-height: 1.6; }

/* ── CONTROL TABLE ── */
.ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; margin-bottom: 24px; }
.ctrl-section-title { font-size: 12.5px; font-weight: 800; color: var(--text-sec); text-transform: uppercase; letter-spacing: .6px; margin: 18px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px; }
.ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #F0EBE6; }
.ctrl-row:last-child { border-bottom: none; }
.ctrl-label { font-size: 15px; color: var(--text); flex: 1; font-weight: 500; }
.ctrl-amount { font-size: 15px; font-weight: 800; min-width: 110px; text-align: left; color: var(--text); }
.ctrl-total { display: flex; justify-content: space-between; padding: 14px 0 0; font-size: 17px; font-weight: 900; border-top: 2px solid; margin-top: 10px; }
/* Expense cards grid */
.exp-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-bottom: 4px; }
.exp-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--r-sm); padding: 14px 12px 12px; position: relative; transition: transform .16s, box-shadow .16s; animation: popIn .22s ease both; display: flex; flex-direction: column; gap: 6px; }
.exp-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); border-color: var(--primary); }
.exp-card-emoji { font-size: 20px; line-height: 1; }
.exp-card-label { font-size: 12px; font-weight: 800; color: var(--text-sec); line-height: 1.2; }
.exp-card-input { width: 100%; font-size: 19px; font-weight: 900; border: none; border-bottom: 2.5px solid var(--border); background: transparent; text-align: center; padding: 4px 0; color: var(--text); font-family: inherit; transition: border-color .14s; outline: none; }
.exp-card-input:focus { border-bottom-color: var(--primary); }
.exp-card-novat { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 600; cursor: pointer; margin-top: 2px; }
.exp-card-novat input { cursor: pointer; accent-color: var(--primary); }
.exp-card-sub { font-size: 10.5px; color: #2563eb; font-weight: 700; text-align: center; min-height: 14px; }
.exp-card-del { position: absolute; top: 6px; left: 6px; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-muted); opacity: 0; transition: opacity .14s, color .14s; line-height: 1; padding: 2px; }
.exp-card:hover .exp-card-del { opacity: 1; }
.exp-card-del:hover { color: var(--error); }

/* ── PL RESULT ── */
.pl-box { border-radius: 20px; padding: 40px 34px; text-align: center; border: 2.5px solid; animation: popIn .35s ease; position: relative; overflow: hidden; }
.pl-box::before { content:''; position:absolute; inset:0; background:linear-gradient(160deg,rgba(255,255,255,.55) 0%,transparent 70%); pointer-events:none; }
.pl-box.profit { border-color: rgba(30,125,75,.35); background: linear-gradient(145deg, #E3F9EE, #CAF0DA, #DFF6EC); box-shadow: var(--glow-success); }
.pl-box.loss   { border-color: rgba(192,57,43,.35); background: linear-gradient(145deg, #FDECEC, #FADCDC, #FDEEEE); }
.pl-label { font-size: 15px; font-weight: 800; color: var(--text-sec); margin-bottom: 14px; letter-spacing: .3px; }
.pl-amount { font-size: 66px; font-weight: 900; letter-spacing: -2px; animation: numChange .4s ease; line-height: 1; }
.pl-box.profit .pl-amount { color: var(--success); text-shadow: 0 2px 20px rgba(30,125,75,.2); }
.pl-box.loss   .pl-amount { color: var(--error); text-shadow: 0 2px 20px rgba(192,57,43,.15); }
.pl-detail { font-size: 14px; color: var(--text-muted); margin-top: 14px; font-weight: 600; }

/* ── TIPS DETAIL PANEL ── */
.tips-detail-panel { margin-top: 20px; border: 2px solid var(--primary); border-radius: var(--r); overflow: hidden; }
.tips-detail-header { background: var(--primary); color: #fff; padding: 12px 20px; font-size: 15px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; }
/* ── TIPS SHIFT SECTION ── */
.shift-block { border-radius: 18px; overflow: hidden; border: 2px solid rgba(0,0,0,.08); box-shadow: 0 6px 24px rgba(0,0,0,.1); animation: slideUp .28s ease both; }
.shift-block-hdr { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.shift-block-stats { display: flex; border-top: 1px solid rgba(0,0,0,.08); border-bottom: 1px solid rgba(0,0,0,.08); background: rgba(0,0,0,.028); }
.shift-stat-col { flex: 1; text-align: center; padding: 15px 8px; border-right: 1px solid rgba(0,0,0,.07); transition: background .15s; }
.shift-stat-col:hover { background: rgba(0,0,0,.03); }
.shift-stat-col:last-child { border-right: none; }
.shift-stat-lbl { font-size: 10.5px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
.shift-stat-val { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1; }
.shift-workers-wrap { padding: 18px 16px 12px; display: flex; flex-direction: column; gap: 0; }

/* ── WORKER CARD v3 (premium redesign) ── */
.twc2 { border-radius: 18px; border: 2px solid rgba(0,0,0,.09); margin-bottom: 18px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.07); background: #fff; transition: box-shadow .22s, transform .22s; animation: slideUp .22s ease both; }
.twc2:hover { box-shadow: 0 10px 32px rgba(0,0,0,.12); transform: translateY(-2px); }
.twc2-head { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1.5px solid rgba(0,0,0,.07); background: rgba(0,0,0,.01); }
.twc2-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #fff; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.22); }
/* main body = vertical flex column */
.twc2-main { padding: 22px 20px 16px; display: flex; flex-direction: column; gap: 22px; border-bottom: 1.5px solid rgba(0,0,0,.06); }
/* time zone (colored pill wrapping both pickers) */
.twc2-timezone { border-radius: 14px; padding: 16px 14px 14px; display: flex; align-items: center; gap: 10px; justify-content: center; }
.twc2-time-block { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; max-width: 190px; }
.twc2-time-lbl { font-size: 13px; font-weight: 800; letter-spacing: .3px; }
.twc2-time-ctrl { display: flex; flex-direction: column; align-items: center; gap: 7px; }
.twc2-time-step-row { display: flex; gap: 6px; }
.twc2-time-step { width: 38px; height: 29px; border: 1.5px solid rgba(255,255,255,.5); background: rgba(255,255,255,.65); border-radius: 8px; font-size: 12px; font-weight: 800; cursor: pointer; color: inherit; transition: all .13s; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.twc2-time-step:hover { background: rgba(255,255,255,.9); border-color: rgba(255,255,255,.8); }
.twc2-time-step:active { transform: scale(.90); }
/* hours chip: centered between the two pickers */
.twc2-hrs-chip { padding: 7px 14px; border-radius: 20px; font-size: 14px; font-weight: 900; white-space: nowrap; text-align: center; flex-shrink: 0; border: 2px solid rgba(255,255,255,.45); background: rgba(255,255,255,.35); backdrop-filter: blur(4px); }
/* big amount area */
.twc2-amount { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 6px 0 8px; position: relative; }
.twc2-amount::before { content:''; display:block; width:48px; height:3px; border-radius:2px; background:rgba(0,0,0,.07); margin-bottom:4px; }
.twc2-amount-lbl { font-size: 10.5px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .7px; }
.twc2-amount-val { font-size: 44px; font-weight: 900; line-height: 1; letter-spacing: -1.5px; }
.twc2-amount-meta { font-size: 13px; font-weight: 700; color: var(--text-sec); }
/* adjustment row */
.twc2-adj { padding: 11px 16px; background: rgba(0,0,0,.02); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-top: 1px solid rgba(0,0,0,.06); }
.twc2-adj-label { font-size: 12px; font-weight: 800; color: var(--text-sec); white-space: nowrap; }
.twc2-adj-btns { display: flex; align-items: center; gap: 3px; }
.twc2-adj-btn { padding: 5px 8px; font-size: 12px; font-weight: 700; border: 1.5px solid var(--border); background: var(--surface); border-radius: var(--r-xs); cursor: pointer; color: var(--text-sec); transition: all .14s; line-height: 1; }
.twc2-adj-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.twc2-adj-btn.neg { color: #DC2626; border-color: rgba(220,38,38,.25); }
.twc2-adj-btn.neg:hover { background: rgba(220,38,38,.07); border-color: #DC2626; }
.twc2-adj-btn.pos { color: #16A34A; border-color: rgba(22,163,74,.25); }
.twc2-adj-btn.pos:hover { background: rgba(22,163,74,.07); border-color: #16A34A; }
.twc2-adj-btn:active { transform: scale(.93); }
.twc2-adj-input { width: 68px; text-align: center; font-size: 15px; font-weight: 800; padding: 5px 6px; border: 2px solid var(--border); border-radius: var(--r-xs); font-family: inherit; transition: border-color .14s; }
.twc2-adj-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(217,119,87,.14); }
.twc2-suppl-ok  { padding: 10px 16px; background: #F0FDF4; border-top: 1px solid #BBF7D0; font-size: 13.5px; font-weight: 700; color: #16A34A; display: flex; align-items: center; gap: 8px; }
.twc2-suppl-bad { padding: 12px 16px; background: linear-gradient(135deg,#FFF1F1,#FEE2E2); border-top: 2px solid #FECACA; display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
/* ── SUPPLEMENT SUMMARY CARD ── */
.suppl-card { margin-top: 24px; border-radius: var(--r); overflow: hidden; border: 2px solid rgba(0,0,0,.09); box-shadow: 0 2px 10px rgba(0,0,0,.07); }
.suppl-card-hdr { padding: 14px 18px; background: var(--surface); border-bottom: 2px solid rgba(0,0,0,.07); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.suppl-emp-bad { padding: 14px 18px; border-bottom: 1px solid #FEE2E2; background: #FFF5F5; }
.suppl-emp-ok  { padding: 9px 18px; border-bottom: 1px solid rgba(0,0,0,.05); display: flex; align-items: center; justify-content: space-between; background: #FAFAFA; }
.suppl-tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 700; margin-top: 6px; margin-left: 4px; }
/* ── DETAILED SUPPLEMENT REPORT ── */
.srpt { margin-top:28px;border-radius:var(--r);overflow:hidden;border:2px solid rgba(0,0,0,.1);box-shadow:0 6px 28px rgba(0,0,0,.12); }
.srpt-hdr { padding:22px 26px;background:linear-gradient(135deg,#1C1917,#292524);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap; }
.srpt-badge-red { text-align:center;background:linear-gradient(135deg,#DC2626,#B91C1C);color:#fff;padding:12px 22px;border-radius:var(--r-sm);min-width:130px;box-shadow:0 4px 12px rgba(220,38,38,.4); }
.srpt-badge-grn { display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;padding:12px 22px;border-radius:var(--r-sm);box-shadow:0 4px 12px rgba(22,163,74,.4);font-size:15px;font-weight:800; }
.srpt-emp { background:#fff;border-bottom:2px solid rgba(0,0,0,.07); }
.srpt-emp-hdr { padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,#FFF5F5,#FEE2E2);border-bottom:2px solid #FECACA;border-right:4px solid #DC2626; }
.srpt-tbl { width:100%;border-collapse:collapse; }
.srpt-tbl th { padding:12px 16px;font-size:13px;font-weight:800;color:var(--text);background:rgba(0,0,0,.04);text-align:right;border-bottom:2px solid rgba(0,0,0,.1);white-space:nowrap; }
.srpt-tbl td { padding:13px 16px;font-size:14.5px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;color:var(--text); }
.srpt-tbl tr:last-child td { border-bottom:none; }
.srpt-tbl tr:hover td { background:rgba(0,0,0,.025); }
.srpt-tbl tfoot td { background:rgba(220,38,38,.05);border-top:2px solid rgba(220,38,38,.15);padding:13px 16px;font-size:14.5px; }
.srpt-ok { background:#F8FAF8;border-top:2px solid rgba(0,0,0,.06); }
.srpt-ok-row { padding:10px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.05);font-size:13.5px; }
.shift-tip-input-wrap { display:flex;flex-direction:column;align-items:center;gap:6px; }
.shift-tip-input-label { font-size:10.5px;font-weight:800;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.6px;text-align:center; }
.shift-tip-sub { font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-align:center;margin-top:2px; }
/* ── ROLE CHIPS / OLD SHIFT CLASSES (kept for compat) ── */
.shift-card { padding: 18px; }
.shift-card.morning-card { background: #FFFBF4; }
.shift-card.evening-card { background: #F5F7FF; }
.stat-chip { display: flex; flex-direction: column; gap: 2px; }
.stat-chip-lbl { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
.stat-chip-val { font-size: 16px; font-weight: 800; color: var(--text); }

/* ── ROLE CHIPS ── */
.role-chip { display:inline-flex;align-items:center;background:var(--primary-light);color:var(--primary-dark);padding:5px 12px;border-radius:20px;font-size:12.5px;font-weight:700;border:1.5px solid rgba(217,119,87,.3);cursor:pointer;transition:all .15s;user-select:none; }
.role-chip:hover { background:rgba(217,119,87,.25); }
.role-chip.active { background:var(--primary);color:#fff;border-color:var(--primary); }

/* ── TIPS ── */
.tips-morning { background: #FFF8F0; }
.tips-evening { background: #F0F5FF; }

/* ── BACKUP BANNER ── */
.backup-banner { display:flex; align-items:center; gap:10px; padding:9px 22px; background:linear-gradient(90deg,#FFF8F0,#FFF3E6); border-bottom:1.5px solid rgba(217,119,87,.2); font-size:13px; color:#7C3D12; font-weight:600; }
.backup-banner-close { margin-right:auto; background:none; border:none; cursor:pointer; color:#9C5A1A; font-size:16px; padding:0 4px; opacity:.7; transition:opacity .15s; }
.backup-banner-close:hover { opacity:1; }

/* ── HEADER ACTION BTNS ── */
.hdr-btn { display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:rgba(255,255,255,.72);font-size:12px;font-weight:700;cursor:pointer;transition:all .16s;white-space:nowrap; }
.hdr-btn:hover { background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25); }
.hdr-btn.green { border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08);color:rgba(74,222,128,.9); }
.hdr-btn.green:hover { background:rgba(74,222,128,.18);color:#4ADE80; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .ctrl-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .tab-contents { padding: 16px; }
  .pl-amount { font-size: 38px; }
}
@media (max-width: 600px) {
  .emp-grid { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
  .panel-header { flex-direction: column; align-items: flex-start; }
}
@media print {
  .tab-nav, .app-header, .btn, .panel-actions { display: none !important; }
  .tab-panel.active { display: block !important; }
}

/* ══════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0; z-index: 10000;
  background: linear-gradient(135deg, #18100D 0%, #2A1A10 50%, #1E130E 100%);
  display: flex; align-items: center; justify-content: center; direction: rtl;
}
.auth-box {
  background: #fff; border-radius: 24px; padding: 40px 36px;
  width: 360px; max-width: calc(100vw - 32px); text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,.5); animation: slideUp .3s ease;
}
.auth-logo  { font-size: 52px; margin-bottom: 8px; }
.auth-title { font-size: 22px; font-weight: 800; color: #1A1514; margin-bottom: 4px; }
.auth-sub   { font-size: 14px; color: #9C9490; margin-bottom: 24px; line-height: 1.5; }
.auth-inp {
  width: 100%; padding: 13px 16px; font-size: 20px; text-align: center;
  border: 2px solid #E2DAD4; border-radius: 12px; outline: none;
  letter-spacing: 4px; margin-bottom: 10px; transition: border-color .15s;
  direction: ltr; font-family: monospace;
}
.auth-inp:focus { border-color: #D97757; box-shadow: 0 0 0 3px rgba(217,119,87,.15); }
.auth-btn-main {
  width: 100%; padding: 13px; background: #D97757; color: #fff;
  border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
  cursor: pointer; margin-top: 6px; transition: background .15s, transform .1s;
}
.auth-btn-main:hover { background: #B85E3E; transform: translateY(-1px); }
.auth-err  { color: #C0392B; font-size: 13px; margin-top: 10px; min-height: 18px; }
.auth-link { background: none; border: none; color: #9C9490; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 14px; display: inline-block; }

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE (≤ 720px)
══════════════════════════════════════════ */
@media (max-width: 720px) {
  .app-header {
    padding: 10px 14px; flex-direction: column; align-items: stretch; gap: 8px;
  }
  .logo { gap: 8px; }
  .logo-sub { display: none; }
  .header-live { display: none; }
  .header-date { font-size: 12px; }
  .app-header > div:last-child { justify-content: flex-start; flex-wrap: wrap; gap: 6px; }
  .hdr-btn { padding: 5px 9px; font-size: 12px; gap: 3px; }

  .tab-nav { padding: 0 4px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; gap: 0; }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn  { padding: 10px 11px 8px; font-size: 12px; white-space: nowrap; flex-shrink: 0; gap: 4px; }
  .tab-icon { font-size: 14px; }

  .tab-contents { padding: 10px 8px; }

  .panel-header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .panel-title  { font-size: 18px; }
  .panel-actions { width: 100%; flex-wrap: wrap; gap: 8px; }
  .panel-actions input[type=text] { width: 100%; }

  .emp-grid { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: 1fr 1fr; }

  .modal-box {
    width: 98%; max-width: 98%; padding: 18px 14px;
    max-height: 94vh; border-radius: 14px; margin: 0 4px;
  }
  .modal-title { font-size: 17px; margin-bottom: 16px; }
  .modal-footer { flex-direction: column-reverse; }
  .modal-footer .btn { width: 100%; text-align: center; }

  .table-wrap { max-height: calc(100vh - 160px); }
  table { min-width: 540px; }

  .btn { padding: 9px 14px; font-size: 13px; }
  .btn-primary { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo" id="auth-logo-wrap"><img id="auth-logo-img" style="display:none;height:56px;width:56px;object-fit:contain;border-radius:10px;margin-bottom:4px"><span id="auth-logo-emoji">🏢</span></div>
    <div class="auth-title" id="auth-biz-title">מנהל העסק</div>
    <div class="auth-sub" id="auth-sub">הכנס סיסמה לכניסה</div>
    <input type="password" id="auth-pw" class="auth-inp" placeholder="••••••••" maxlength="50"
           onkeydown="if(event.key==='Enter')authNext()">
    <input type="password" id="auth-pw2" class="auth-inp" placeholder="אשר סיסמה" maxlength="50"
           style="display:none" onkeydown="if(event.key==='Enter')authNext()">
    <button class="auth-btn-main" onclick="authNext()" id="auth-btn">כניסה</button>
    <div class="auth-err" id="auth-err"></div>
    <button class="auth-link" id="auth-reset-link" onclick="authReset()" style="display:none">שכחתי סיסמה — איפוס</button>
  </div>
</div>

<div id="app" style="display:none">

<!-- ═══ HEADER ═══ -->
<header class="app-header" id="app-header">
  <div class="logo" style="cursor:pointer" onclick="openBizSettings()" title="הגדרות עסק">
    <div id="hdr-logo-wrap" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.1);flex-shrink:0">
      <img id="hdr-logo-img" style="display:none;width:44px;height:44px;object-fit:contain">
      <span id="hdr-logo-emoji" class="logo-coffee">🏢</span>
    </div>
    <div>
      <div style="letter-spacing:-.5px;font-size:22px" id="hdr-biz-name"><span class="accent">מנהל</span> העסק</div>
      <div class="logo-sub">מערכת ניהול עסקית מתקדמת</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <div class="header-live"><div class="header-live-dot"></div><span class="header-live-txt">מערכת פעילה</span></div>
    <div class="header-date" id="hdate"></div>
    <button class="hdr-btn green" onclick="exportBackup()" title="גיבוי כל הנתונים לקובץ JSON">💾 גיבוי</button>
    <button class="hdr-btn" onclick="triggerImport()" title="שחזור נתונים מקובץ גיבוי">📂 שחזור</button>
    <button class="hdr-btn" id="sync-btn" onclick="openSyncModal()" title="סנכרון ענן" style="display:none">☁️ <span id="sync-label">ענן</span></button>
    <button class="hdr-btn" onclick="openBizSettings()" title="הגדרות עסק">⚙️</button>
    <button class="hdr-btn" onclick="loadDemoData()" title="טען נתוני דוגמה לבדיקה">🎭 דוגמה</button>
    <button class="hdr-btn" onclick="confirmReset()" title="מחק את כל הנתונים" style="border-color:rgba(220,38,38,.25);color:rgba(220,120,100,.7)">🗑️ איפוס</button>
  </div>
</header>
<input type="file" id="biz-logo-input" accept="image/*" style="display:none" onchange="handleLogoUpload(this)">
<input type="file" id="backup-file-input" accept=".json" style="display:none" onchange="handleImport(this)">

<!-- ═══ BACKUP BANNER ═══ -->
<div id="backup-banner" class="backup-banner" style="display:none">
  ⚠️ <strong>שים לב:</strong> הנתונים נשמרים בדפדפן בלבד. ניקוי דפדפן / מחשב אחר = איבוד נתונים.
  <button class="hdr-btn green" onclick="exportBackup()" style="font-size:12px;padding:4px 10px">💾 גיבוי עכשיו</button>
  <button class="backup-banner-close" onclick="dismissBanner()" title="סגור">✕</button>
</div>

<!-- ═══ TAB NAV ═══ -->
<nav class="tab-nav">
  <button class="tab-btn active" id="btn-employees" onclick="switchTab('employees')"><span class="tab-icon">👥</span> עובדים</button>
  <button class="tab-btn" id="btn-zreport"   onclick="switchTab('zreport')"><span class="tab-icon">📊</span> דוח Z</button>
  <button class="tab-btn" id="btn-purchases" onclick="switchTab('purchases')"><span class="tab-icon">🛒</span> קניות</button>

function uid() {

}

function ILS(amount) {
  var n = toNum(amount);
  if (n === 0) return '₪ 0';
  return '₪ ' + n.toLocaleString('he-IL', {minimumFractionDigits:0, maximumFractionDigits:2});
}

/* ================================================================
   SALARY CALCULATIONS
================================================================ */
function calcSalary(emp, rec) {
  if (!rec) return {base:0, ot125:0, ot150:0, travel:0, bonus:0, advance:0, total:0, hours:0};
  var hr      = emp.type === 'hourly' ? toNum(emp.hourlyRate) : toNum(emp.monthlySalary) / 182;
  var base    = emp.type === 'hourly' ? toNum(rec.regHours) * toNum(emp.hourlyRate) : toNum(emp.monthlySalary);
  var ot125   = toNum(rec.ot125) * hr * 1.25;
  var ot150   = toNum(rec.ot150) * hr * 1.50;
  var travel  = toNum(rec.travelDays) * toNum(emp.travelPerDay);
  var bonus   = toNum(rec.bonus);
  var advance = toNum(rec.advance);
  var hours   = toNum(rec.regHours) + toNum(rec.ot125) + toNum(rec.ot150);
  var total   = base + ot125 + ot150 + travel + bonus - advance;
  return {base:base, ot125:ot125, ot150:ot150, travel:travel, bonus:bonus, advance:advance, total:total, hours:hours};
}

function saveEmp() {
  var name           = document.getElementById('m-name').value.trim();
  var type           = document.getElementById('m-type').value;
  var num            = document.getElementById('m-num').value.trim();
  var phone          = document.getElementById('m-phone').value.trim();
  var dob            = getDobValue();
  var address        = document.getElementById('m-address').value.trim();
  var hourlyRate     = toNum(document.getElementById('m-rate').value);
  var monthlySalary  = toNum(document.getElementById('m-sal').value);
  var travelPerDay   = toNum(document.getElementById('m-travel').value);

  if (!name) { toast('נא להזין שם עובד', 'err'); return; }
  if (!editEmpRoles.length) { toast('נא לבחור לפחות תפקיד אחד', 'err'); return; }
  if (type === 'hourly' && hourlyRate <= 0) { toast('תעריף לשעה חייב להיות גדול מ-0', 'err'); return; }
  if (type === 'monthly' && monthlySalary <= 0) { toast('משכורת חודשית חייבת להיות גדולה מ-0', 'err'); return; }
  if (type === 'hourly' && hourlyRate > 500)  { if (!confirm('תעריף ₪' + hourlyRate + ' לשעה — האם זה נכון?')) return; }
  if (type === 'monthly' && monthlySalary > 50000) { if (!confirm('משכורת ₪' + monthlySalary + ' — האם זה נכון?')) return; }

  editEmpRoles.forEach(function(r) { if (S.roles.indexOf(r) === -1) S.roles.push(r); });
  var empData = {name:name, type:type, num:num, roles:editEmpRoles.slice(), role:editEmpRoles[0]||'', phone:phone, dob:dob, address:address, hourlyRate:hourlyRate, monthlySalary:monthlySalary, travelPerDay:travelPerDay, active:true};

  if (editEmpId) {
    var idx = S.employees.findIndex(function(e){ return e.id === editEmpId; });
    if (idx >= 0) {
      empData.id     = S.employees[idx].id;
      empData.active = S.employees[idx].active;
      S.employees[idx] = empData;
    }
  } else {
    empData.id = uid();
    S.employees.push(empData);
  }

  persist();
  closeModal();
  renderEmps();
  toast('✅ פרטי העובד נשמרו');
}

function toggleEmpActive(id) {
  var emp = S.employees.find(function(x){ return x.id === id; });
  if (!emp) return;
  emp.active = !emp.active;
  persist();
  renderEmps();

function deleteEmp(id) {

  S.employees = S.employees.filter(function(x){ return x.id !== id; });
  persist();
  renderEmps();

function curDate() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function aggregateMonth(empId, ym) {
  var days   = daysInMonth(ym);
  var prefix = empId + '|';
  var agg    = {regHours:0, ot125:0, ot150:0, travelDays:0, workDays:0, bonus:0, advance:0, sickDays:0, vacDays:0, notes:''};
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    var dayRec = S.dailyHours[ds] || {};
    var dayHrs = 0;
    // Plain entry (backward compat / single-role)
    var rp = dayRec[empId] || {};
    var hp = toNum(rp.regHours) + toNum(rp.ot125) + toNum(rp.ot150);
    if (hp > 0) {
      agg.regHours += toNum(rp.regHours); agg.ot125 += toNum(rp.ot125); agg.ot150 += toNum(rp.ot150);
      dayHrs += hp;
    }
    // Role-specific entries (empId|role)
    Object.keys(dayRec).forEach(function(k) {
      if (k.indexOf(prefix) !== 0) return;
      var r = dayRec[k];
      var h = toNum(r.regHours) + toNum(r.ot125) + toNum(r.ot150);
      if (h > 0) {
        agg.regHours += toNum(r.regHours); agg.ot125 += toNum(r.ot125); agg.ot150 += toNum(r.ot150);
        dayHrs += h;
      }
    });
    if (dayHrs > 0) { agg.workDays += 1; agg.travelDays += 1; }
  }
  var monthly = (S.monthlyData[ym] || {})[empId] || {};
  agg.bonus    = toNum(monthly.bonus);
  agg.advance  = toNum(monthly.advance);
  agg.sickDays = toNum(monthly.sickDays);
  agg.vacDays  = toNum(monthly.vacDays);
  agg.notes    = monthly.notes || '';
  return agg;
}

function aggregateMonthByRole(empId, ym) {
  var days   = daysInMonth(ym);
  var prefix = empId + '|';
  var byRole = {};
  for (var d = 1; d <= days; d++) {
    var ds = dateFull(ym, d);
    var dayRec = S.dailyHours[ds] || {};
    // Plain entry → role '_'
    var rp = dayRec[empId];
    if (rp) {
      var hp = toNum(rp.regHours) + toNum(rp.ot125) + toNum(rp.ot150);
      if (hp > 0) {
        if (!byRole['_']) byRole['_'] = {regHours:0,ot125:0,ot150:0};
        byRole['_'].regHours += toNum(rp.regHours); byRole['_'].ot125 += toNum(rp.ot125); byRole['_'].ot150 += toNum(rp.ot150);
      }
    }
    // Role-specific
    Object.keys(dayRec).forEach(function(k) {
      if (k.indexOf(prefix) !== 0) return;
      var role = k.slice(prefix.length);
      var r = dayRec[k];
      var h = toNum(r.regHours) + toNum(r.ot125) + toNum(r.ot150);
      if (h > 0) {
        if (!byRole[role]) byRole[role] = {regHours:0,ot125:0,ot150:0};
        byRole[role].regHours += toNum(r.regHours); byRole[role].ot125 += toNum(r.ot125); byRole[role].ot150 += toNum(r.ot150);
      }
    });
  }
  return byRole;
}

function setHoursDate(ds) {
  selectedHoursDate = ds;
  renderHoursDaily();
}

function saveDayField(inp) {
  var empId  = inp.dataset.deid;
  var role   = inp.dataset.role || '';
  var stKey  = role ? (empId + '|' + role) : empId;
  var ds     = inp.dataset.ds;
  var fk     = inp.dataset.key;
  var val    = toNum(inp.value);
  if (val < 0) { val = 0; inp.value = 0; }
  if (val > 24) { val = 24; inp.value = 24; }
  if (!S.dailyHours[ds])        S.dailyHours[ds] = {};
  if (!S.dailyHours[ds][stKey]) S.dailyHours[ds][stKey] = {};
  S.dailyHours[ds][stKey][fk] = val;
  persist();
}


function saveMonthExtra(inp, ym) {
  var empId = inp.dataset.meid;
  var key   = inp.dataset.mkey;
  if (!S.monthlyData[ym])        S.monthlyData[ym] = {};
  if (!S.monthlyData[ym][empId]) S.monthlyData[ym][empId] = {};
  var strKeys  = ['notes','bonusNote'];
  var dateKeys = ['bonusDate','advanceDate'];
  S.monthlyData[ym][empId][key] = (strKeys.indexOf(key) >= 0 || dateKeys.indexOf(key) >= 0) ? inp.value : toNum(inp.value);
  persist();
}

function renderHours() {
  if (hoursMode === 'daily')        renderHoursDaily();
  else if (hoursMode === 'weekly')  renderHoursWeekly();
  else                              renderHoursMonthly();
}

function _weekStartOf(ds) {
  var d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() - d.getDay()); // back to Sunday
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function stepWeek(delta) {
  var d = new Date(selectedWeekStart + 'T12:00:00');
  d.setDate(d.getDate() + delta * 7);
  selectedWeekStart = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  renderHoursWeekly();
}

function renderHoursWeekly() {
  if (!selectedWeekStart) selectedWeekStart = _weekStartOf(selectedHoursDate || curDate());
  var emps = S.employees.filter(function(e){ return e.active; });
  var cont = document.getElementById('hours-content');

  if (!emps.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">⏱</div><div class="empty-title">אין עובדים פעילים</div><div class="empty-text">הוסף עובדים בלשונית "עובדים" תחילה</div></div>';
    return;
  }

  // Build 7 day-strings for this week (Sunday → Saturday)
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(selectedWeekStart + 'T12:00:00');
    d.setDate(d.getDate() + i);
    var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    days.push({ ds: ds, dow: d.getDay(), dd: String(d.getDate()).padStart(2,'0'), mm: String(d.getMonth()+1).padStart(2,'0') });
  }

  var weekEnd  = days[6].ds;
  var today    = curDate();
  var isThisWeek = days[0].ds <= today && today <= weekEnd;

  // Week nav bar
  var p0 = days[0], p6 = days[6];

    '<div style="display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:18px;flex-wrap:wrap">' +
      '<button class="btn btn-secondary btn-sm" onclick="stepWeek(-1)">→ שבוע קודם</button>' +
      '<div style="flex:1;text-align:center;font-size:16px;font-weight:800">' +
        'שבוע ' + p0.dd + '/' + p0.mm + ' — ' + p6.dd + '/' + p6.mm +
      '</div>' +
      (!isThisWeek ? '<button class="btn btn-secondary btn-sm" onclick="selectedWeekStart=_weekStartOf(\'' + today + '\');renderHoursWeekly()">📅 השבוע</button>' : '<span style="font-size:12px;color:var(--success);font-weight:700">✅ השבוע הנוכחי</span>') +
      '<button class="btn btn-secondary btn-sm" onclick="stepWeek(1)">שבוע הבא ←</button>' +
    '</div>';

  // Filter employees
  var filtered = hoursRoleFilter
    ? emps.filter(function(e){ return empHasRole(e, hoursRoleFilter); })
    : emps;

  // Role filter bar
  var roleFilterBar = '';
  if (S.roles && S.roles.length) {
    var rfOpts = '<button class="btn ' + (!hoursRoleFilter?'btn-primary':'btn-secondary') + ' btn-sm" onclick="setHoursRoleFilter(\'\')">כולם</button>';
    S.roles.forEach(function(r) {
      rfOpts += '<button class="btn ' + (hoursRoleFilter===r?'btn-primary':'btn-secondary') + ' btn-sm" onclick="setHoursRoleFilter(\'' + escHtml(r) + '\')">' + escHtml(r) + '</button>';

      '<span style="font-size:12px;font-weight:800;color:var(--text-muted)">סנן לפי תפקיד:</span>' + rfOpts + '</div>';
  }

  // Table header
  var FRIDAY = 5, SATURDAY = 6;
  var thead = '<thead><tr>' +
    '<th class="sticky-col" style="min-width:140px">עובד</th>';
  days.forEach(function(day) {
    var isSat  = day.dow === SATURDAY;
    var isFri  = day.dow === FRIDAY;
    var isToday = day.ds === today;
    var col = (isSat ? 'color:var(--error)' : (isFri ? 'color:var(--warning)' : ''));
    var todayMark = isToday ? ' style="background:rgba(217,119,87,.10)"' : '';
    thead += '<th' + todayMark + '>' +
      '<div style="font-weight:800;font-size:13px;' + col + '">' + DHE[day.dow] + '</div>' +
      '<div style="font-size:12px;color:var(--text-muted)">' + day.dd + '/' + day.mm + '</div>' +
    '</th>';
  });
  thead += '<th style="min-width:70px">סה"כ</th></tr>' +
    '<tr style="background:var(--surface);font-size:11px;color:var(--text-muted)">' +
    '<th class="sticky-col"></th>';
  days.forEach(function() {
    thead += '<th><div style="display:flex;gap:2px;justify-content:center;font-size:10px">' +
      '<span style="color:var(--text-muted)" title="שעות רגילות">רגיל</span>' +
      '<span style="color:var(--text-muted)">·</span>' +
      '<span style="color:#b45309" title="ש״נ 125%">125</span>' +
      '<span style="color:var(--text-muted)">·</span>' +
      '<span style="color:#b91c1c" title="ש״נ 150%">150</span>' +
    '</div></th>';
  });
  thead += '<th></th></tr></thead>';

  // Table body
  var tbody = '';
  var weekTotals = {}; // ds → total hours
  days.forEach(function(day) { weekTotals[day.ds] = 0; });

  filtered.forEach(function(emp) {
    var empTotal = 0;
    var cells = '';
    days.forEach(function(day) {
      var r = (S.dailyHours[day.ds] || {})[emp.id] || {};
      var reg = toNum(r.regHours), ot1 = toNum(r.ot125), ot2 = toNum(r.ot150);
      var daySum = reg + ot1 + ot2;
      empTotal += daySum;
      weekTotals[day.ds] += daySum;
      var isToday = day.ds === today;
      var isSat   = day.dow === SATURDAY;
      var cellBg  = isToday ? 'background:rgba(217,119,87,.07)' : (isSat ? 'background:rgba(220,38,38,.04)' : '');

      cells += '<td style="padding:4px 3px;' + (hasBg || cellBg) + '">' +

          '<input type="number" class="ti" min="0" max="24" step=".5"' +
            ' data-deid="' + emp.id + '" data-ds="' + day.ds + '" data-key="ot125"' +
            ' value="' + (ot1 || '') + '" placeholder="—"' +
            ' oninput="saveDayField(this);renderWeeklyTotals()"' +
            ' style="width:32px;font-size:11px;padding:3px 2px;text-align:center;background:#fef3c7">' +
          '<input type="number" class="ti" min="0" max="24" step=".5"' +
            ' data-deid="' + emp.id + '" data-ds="' + day.ds + '" data-key="ot150"' +
            ' value="' + (ot2 || '') + '" placeholder="—"' +
            ' oninput="saveDayField(this);renderWeeklyTotals()"' +
            ' style="width:32px;font-size:11px;padding:3px 2px;text-align:center;background:#fee2e2">' +
        '</div>' +
      '</td>';

    tbody += '<tr>' +

        (getEmpRoleStr(emp) ? '<div style="font-size:11px;color:var(--text-muted)">' + escHtml(getEmpRoleStr(emp)) + '</div>' : '') +
      '</td>' +

      '<td style="text-align:center;font-weight:800;font-size:14px;color:' + (empTotal>0?'var(--success)':'var(--text-muted)') + '" class="wk-emp-' + emp.id + '">' +
        (empTotal > 0 ? empTotal.toFixed(1) : '—') +
      '</td>' +
    '</tr>';
  });

  // Footer totals row
  var footerCells = '<td class="sticky-col" style="font-weight:800;font-size:13px">סה"כ ביום</td>';
  var grandTotal = 0;
  days.forEach(function(day) {
    var t = weekTotals[day.ds] || 0;
    grandTotal += t;
    footerCells += '<td style="text-align:center;font-weight:700;font-size:13px;color:' + (t>0?'var(--primary)':'var(--text-muted)') + '" class="wk-day-' + day.ds + '">' + (t>0?t.toFixed(1):'—') + '</td>';
  });
  footerCells += '<td style="text-align:center;font-weight:900;font-size:15px;color:var(--primary)" class="wk-grand">' + (grandTotal>0?grandTotal.toFixed(1):'—') + '</td>';

    '</table></div>' +

      '💡 נשמר אוטומטית · ' +
      '<span style="background:#fef3c7;padding:1px 5px;border-radius:4px;font-size:11px">125%</span> שעות נוספות 125 · ' +
      '<span style="background:#fee2e2;padding:1px 5px;border-radius:4px;font-size:11px">150%</span> שעות נוספות 150' +
    '</div>';
}

function renderWeeklyTotals() {
  if (hoursMode !== 'weekly') return;
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(selectedWeekStart + 'T12:00:00');
    d.setDate(d.getDate() + i);
    days.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
  }
  var emps = S.employees.filter(function(e){ return e.active; });
  var grand = 0;
  days.forEach(function(ds) {
    var t = 0;
    emps.forEach(function(emp) {
      var r = (S.dailyHours[ds] || {})[emp.id] || {};
      t += toNum(r.regHours) + toNum(r.ot125) + toNum(r.ot150);
    });
    grand += t;
    var el = document.querySelector('.wk-day-' + ds);
    if (el) { el.textContent = t > 0 ? t.toFixed(1) : '—'; el.style.color = t > 0 ? 'var(--primary)' : 'var(--text-muted)'; }
  });
  emps.forEach(function(emp) {
    var et = 0;
    days.forEach(function(ds) {
      var r = (S.dailyHours[ds] || {})[emp.id] || {};
      et += toNum(r.regHours) + toNum(r.ot125) + toNum(r.ot150);
    });
    var el = document.querySelector('.wk-emp-' + emp.id);
    if (el) { el.textContent = et > 0 ? et.toFixed(1) : '—'; el.style.color = et > 0 ? 'var(--success)' : 'var(--text-muted)'; }
  });
  var gel = document.querySelector('.wk-grand');
  if (gel) { gel.textContent = grand > 0 ? grand.toFixed(1) : '—'; }
}

    return;
  }

  var parts  = ds.split('-');

  var navBar =
    '<div style="display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:18px;flex-wrap:wrap">' +

      (ds !== today ? '<button class="btn btn-secondary btn-sm" onclick="setHoursDate(\'' + today + '\')">📅 היום</button>' : '') +
      '<button class="btn btn-secondary btn-sm" onclick="stepDate(1)">יום הבא ←</button>' +
    '</div>';

  var dayRecs = S.dailyHours[ds] || {};

  // Role filter bar
  var roleFilterBar = '';
  if (S.roles && S.roles.length) {
    var rfOpts = '<button class="btn ' + (!hoursRoleFilter?'btn-primary':'btn-secondary') + ' btn-sm" onclick="setHoursRoleFilter(\'\')">כולם</button>';
    S.roles.forEach(function(r) {
      rfOpts += '<button class="btn ' + (hoursRoleFilter===r?'btn-primary':'btn-secondary') + ' btn-sm" onclick="setHoursRoleFilter(\'' + escHtml(r) + '\')">' + escHtml(r) + '</button>';
    });
    roleFilterBar = '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:14px">' +
      '<span style="font-size:12px;font-weight:800;color:var(--text-muted)">סנן לפי תפקיד:</span>' + rfOpts + '</div>';
  }

  // Filter and group employees by role
  var filtered = hoursRoleFilter
    ? emps.filter(function(e){ return empHasRole(e, hoursRoleFilter); })
    : emps;

  // Build grouped rows — each employee appears in ALL their role groups
  var tbody = '';
  var groupMap = {};
  var groupOrder = (S.roles && S.roles.length) ? S.roles.slice() : [];
  filtered.forEach(function(emp) {
    var roles = getEmpRoles(emp);
    if (!roles.length) roles = ['ללא תפקיד'];
    roles.forEach(function(role) {
      if (!groupMap[role]) { groupMap[role] = []; if (groupOrder.indexOf(role) < 0) groupOrder.push(role); }
      groupMap[role].push(emp);
    });
  });
  // Only keep roles that have employees
  var roleOrder = groupOrder.filter(function(r){ return groupMap[r]; });
  var showGroups = !hoursRoleFilter && roleOrder.length > 1;
  var countedIds = {}; // to avoid double-counting in summary

  roleOrder.forEach(function(role) {
    if (showGroups) {
      tbody += '<tr><td colspan="5" style="background:var(--primary-light);font-weight:800;font-size:12.5px;color:var(--primary-dark);padding:7px 14px;letter-spacing:.3px">' + escHtml(role) + '</td></tr>';

    groupMap[role].forEach(function(emp) {
      var r = dayRecs[emp.id] || {};
      var h = toNum(r.regHours) + toNum(r.ot125) + toNum(r.ot150);
      if (h > 0 && !countedIds[emp.id]) { workedToday++; totalHrsToday += h; countedIds[emp.id] = true; }
      var rowBg = h > 0 ? 'background:#FAFFF8' : '';
      tbody += '<tr style="' + rowBg + '">';

        '<strong>' + escHtml(emp.name) + '</strong>' +

      '</td>';
      [{k:'regHours'},{k:'ot125'},{k:'ot150'}].forEach(function(f) {
        tbody += '<td><input type="number" class="ti ti-w70" min="0" max="24" step=".5"' +
          ' data-deid="' + emp.id + '" data-ds="' + ds + '" data-key="' + f.k + '"' +
          ' value="' + (toNum(r[f.k]) || '') + '" placeholder="0"' +
          ' oninput="saveDayField(this)"></td>';
      });
      tbody += '<td style="text-align:center;color:' + (h>0?'var(--success)':'var(--text-muted)') + ';font-size:13px;font-weight:700">' + (h>0?'✓ אוטו':'—') + '</td>';
      tbody += '</tr>';
    });
  });

  cont.innerHTML =
    navBar +
    roleFilterBar +
    '<div class="summary-grid" style="margin-bottom:18px">' +
      '<div class="s-card"><div class="s-label">👥 עבדו היום</div><div class="s-value">' + workedToday + ' / ' + filtered.length + '</div></div>' +
      '<div class="s-card"><div class="s-label">⏱ סה"כ שעות</div><div class="s-value">' + totalHrsToday.toFixed(1) + '</div></div>' +
    '</div>' +
    '<div class="table-wrap"><table>' +
      '<thead><tr>' +
        '<th class="sticky-col" style="min-width:150px">שם עובד</th>' +
        '<th style="min-width:90px">שעות רגילות</th>' +
        '<th style="min-width:75px">ש"נ 125%</th>' +
        '<th style="min-width:75px">ש"נ 150%</th>' +
        '<th style="min-width:70px">🚌 נסיעה</th>' +
      '</tr></thead>' +
      '<tbody>' + tbody + '</tbody>' +
    '</table></div>' +
    '<div style="margin-top:10px;font-size:12.5px;color:var(--text-muted)">💡 נשמר אוטומטית · ✓ אוטו = נסיעה תחושב אוטומטית לפי ימי עבודה</div>';
}

      '</td>';
      tbody += '<td><input type="text" class="ti ti-w100" data-meid="' + emp.id + '" data-mkey="notes" value="' + escHtml(monthly.notes||'') + '" placeholder="הערות" oninput="saveMonthExtra(this,\'' + ym + '\')"></td>';
      tbody += '</tr>';

/* ================================================================
   TAB 3 — PAYROLL
================================================================ */
function renderPayroll() {
  var ym   = document.getElementById('payroll-month').value;
  var emps = S.employees.filter(function(e){ return e.active; });
  var cont = document.getElementById('payroll-content');

  if (!emps.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">💰</div><div class="empty-title">אין עובדים פעילים</div></div>';
    return;
  }

  var totBase=0, totOT=0, totTrav=0, totBon=0, totAdv=0, totSuppl=0, grand=0;
  var missing = [];
  var tbody = '';
  var tipsRpt = getDetailedSupplementReport(ym);

  emps.forEach(function(emp) {
    var agg    = aggregateMonth(emp.id, ym);
    if (emp.type === 'hourly' && !agg.workDays) missing.push(emp.name);
    var s      = calcSalary(emp, agg);
    var suppl  = (tipsRpt[emp.id] || {}).totalSuppl || 0;
    totBase += s.base; totOT += s.ot125 + s.ot150;
    totTrav += s.travel; totBon += s.bonus; totAdv += s.advance;
    totSuppl += suppl; grand += s.total + suppl;

    var byRole   = aggregateMonthByRole(emp.id, ym);
    var rKeys    = Object.keys(byRole);
    var typeBadge = '<span class="badge ' + (emp.type==='hourly'?'badge-hourly':'badge-monthly') + '">' + (emp.type==='hourly'?'שעתי':'חודשי') + '</span>';
    var hrRate   = emp.type === 'hourly' ? toNum(emp.hourlyRate) : toNum(emp.monthlySalary) / 182;
    var monthly2 = (S.monthlyData[ym] || {})[emp.id] || {};
    var bonusCel = s.bonus > 0
      ? ILS(s.bonus) + (monthly2.bonusNote ? '<div style="font-size:12px;font-weight:700;color:#92400E;background:#FFF7ED;border-right:3px solid #D97757;padding:3px 7px;border-radius:0 5px 5px 0;margin-top:4px;white-space:normal;line-height:1.4">💬 ' + escHtml(monthly2.bonusNote) + '</div>' : '')
      : '—';

    if (rKeys.length <= 1) {
      // Single role — one row as usual
      var totalWithSuppl = s.total + suppl;
      tbody +=
        '<tr>' +
          '<td class="sticky-col"><strong>' + escHtml(emp.name) + '</strong></td>' +
          '<td>' + typeBadge + '</td>' +
          '<td style="text-align:center">' + (agg.workDays || '—') + '</td>' +
          '<td>' + (s.hours > 0 ? s.hours.toFixed(1) : '—') + '</td>' +
          '<td>' + ILS(s.base) + '</td>' +
          '<td>' + (s.ot125+s.ot150 > 0 ? ILS(s.ot125+s.ot150) : '—') + '</td>' +
          '<td>' + (s.travel > 0 ? ILS(s.travel) : '—') + '</td>' +
          '<td>' + bonusCel + '</td>' +
          '<td>' + (suppl > 0 ? '<span style="color:#7C3AED;font-weight:800">+' + ILS(suppl) + '</span>' : '—') + '</td>' +
          '<td>' + (s.advance > 0 ? '<span style="color:var(--error);font-weight:700">−' + ILS(s.advance) + '</span>' : '—') + '</td>' +
          '<td><strong style="color:' + (totalWithSuppl >= 0 ? 'var(--success)' : 'var(--error)') + ';font-size:15px">' + ILS(totalWithSuppl) + '</strong></td>' +
          '<td style="white-space:nowrap">' +
            '<button class="btn btn-secondary btn-icon btn-sm" onclick="openEmpDetail(\'' + emp.id + '\',\'' + ym + '\')" title="פרטים מלאים">🔍</button> ' +
            '<button class="btn btn-secondary btn-icon btn-sm" onclick="printPayslip(\'' + emp.id + '\',\'' + ym + '\')" title="הדפס תלוש שכר">🖨️</button>' +
          '</td>' +
        '</tr>';
    } else {
      // Multi-role — header + per-role rows + total
      tbody += '<tr style="background:rgba(217,119,87,.08)">' +
        '<td class="sticky-col" colspan="2"><strong>' + escHtml(emp.name) + '</strong> ' + typeBadge + '</td>' +
        '<td style="text-align:center;color:var(--text-muted);font-size:12px" colspan="10">' + rKeys.length + ' תפקידים — ' + (agg.workDays||0) + ' ימי עבודה</td>' +
      '</tr>';

      rKeys.forEach(function(rk) {
        var ra   = byRole[rk];
        var rn   = rk === '_' ? '(שעות כלליות)' : rk;
        var rHrs = ra.regHours + ra.ot125 + ra.ot150;
        var rPay = ra.regHours * hrRate + ra.ot125 * hrRate * 1.25 + ra.ot150 * hrRate * 1.5;
        var rOT  = ra.ot125 * hrRate * 0.25 + ra.ot150 * hrRate * 0.5;
        tbody += '<tr style="background:rgba(0,0,0,.025)">' +
          '<td class="sticky-col" style="padding-right:28px;font-size:13px;color:var(--text-sec)">↳ ' + escHtml(rn) + '</td>' +
          '<td></td>' +
          '<td></td>' +
          '<td style="font-size:13px">' + (rHrs > 0 ? rHrs.toFixed(1) : '—') + '</td>' +
          '<td style="font-size:13px">' + (rPay > 0 ? ILS(rPay) : '—') + '</td>' +
          '<td style="font-size:13px">' + (rOT  > 0 ? ILS(rOT) : '—') + '</td>' +
          '<td colspan="6" style="color:var(--text-muted);font-size:11px">' +
            (ra.ot125 > 0 ? ra.ot125.toFixed(1) + 'ש׳125 ' : '') +
            (ra.ot150 > 0 ? ra.ot150.toFixed(1) + 'ש׳150' : '') +
          '</td>' +
        '</tr>';
      });

      // Total row
      var totalWithSupplM = s.total + suppl;
      tbody += '<tr style="border-top:2px solid var(--border);border-bottom:2px solid var(--border)">' +
        '<td class="sticky-col" style="padding-right:28px"><strong>סה"כ</strong></td>' +
        '<td></td>' +
        '<td style="text-align:center">' + (agg.workDays || '—') + '</td>' +
        '<td><strong>' + (s.hours > 0 ? s.hours.toFixed(1) : '—') + '</strong></td>' +
        '<td><strong>' + ILS(s.base) + '</strong></td>' +
        '<td><strong>' + (s.ot125+s.ot150 > 0 ? ILS(s.ot125+s.ot150) : '—') + '</strong></td>' +
        '<td>' + (s.travel > 0 ? ILS(s.travel) : '—') + '</td>' +
        '<td>' + bonusCel + '</td>' +
        '<td>' + (suppl > 0 ? '<span style="color:#7C3AED;font-weight:800">+' + ILS(suppl) + '</span>' : '—') + '</td>' +
        '<td>' + (s.advance > 0 ? '<span style="color:var(--error);font-weight:700">−' + ILS(s.advance) + '</span>' : '—') + '</td>' +
        '<td><strong style="color:var(--primary);font-size:15px">' + ILS(totalWithSupplM) + '</strong></td>' +
        '<td style="white-space:nowrap">' +
          '<button class="btn btn-secondary btn-icon btn-sm" onclick="openEmpDetail(\'' + emp.id + '\',\'' + ym + '\')" title="פרטים מלאים">🔍</button> ' +
          '<button class="btn btn-secondary btn-icon btn-sm" onclick="printPayslip(\'' + emp.id + '\',\'' + ym + '\')" title="הדפס תלוש שכר">🖨️</button>' +
        '</td>' +
      '</tr>';
    }
  });

  var alertHtml = missing.length
    ? '<div class="alert alert-warn">⚠️ חסרים נתוני שעות לעובדים: <strong>' + missing.join(', ') + '</strong></div>'
    : '<div class="alert alert-ok">✅ כל הנתונים מלאים</div>';

  cont.innerHTML =
    alertHtml +
    '<div class="summary-grid">' +
      '<div class="s-card"><div class="s-label">שכר בסיס</div><div class="s-value">' + ILS(totBase) + '</div></div>' +
      '<div class="s-card"><div class="s-label">שעות נוספות</div><div class="s-value">' + ILS(totOT) + '</div></div>' +
      '<div class="s-card"><div class="s-label">נסיעות</div><div class="s-value">' + ILS(totTrav) + '</div></div>' +
      '<div class="s-card"><div class="s-label">תוספות</div><div class="s-value">' + ILS(totBon) + '</div></div>' +
      (totSuppl > 0 ? '<div class="s-card" style="border-color:#7C3AED"><div class="s-label" style="color:#5B21B6">⚡ השלמת טיפים</div><div class="s-value" style="color:#7C3AED">+' + ILS(totSuppl) + '</div></div>' : '') +
      (totAdv > 0 ? '<div class="s-card" style="border-color:var(--error)"><div class="s-label">💳 מפרעות</div><div class="s-value red">−' + ILS(totAdv) + '</div></div>' : '') +
      '<div class="s-card green-card"><div class="s-label">💰 סה"כ לתשלום</div><div class="s-value green">' + ILS(grand) + '</div></div>' +
    '</div>' +
    '<div class="table-wrap"><table>' +
      '<thead><tr>' +
        '<th class="sticky-col" style="min-width:150px">שם עובד</th>' +
        '<th>סוג</th><th>ימי עבודה</th><th>שעות</th><th>שכר בסיס</th><th>ש"נ</th><th>נסיעות</th><th>תוספות</th>' +
        '<th style="color:#7C3AED">⚡ השלמת טיפים</th>' +
        '<th>מפרעה</th><th>💰 סה"כ נטו</th><th></th>' +
      '</tr></thead>' +
      '<tbody>' + tbody + '</tbody>' +
      '<tfoot><tr class="tr-total">' +
        '<td class="sticky-col"><strong>סה"כ חודש</strong></td>' +
        '<td></td><td></td><td></td>' +
        '<td><strong>' + ILS(totBase) + '</strong></td>' +
        '<td><strong>' + ILS(totOT)   + '</strong></td>' +
        '<td><strong>' + ILS(totTrav) + '</strong></td>' +
        '<td><strong>' + ILS(totBon)  + '</strong></td>' +
        '<td><strong style="color:#7C3AED">' + (totSuppl > 0 ? '+' + ILS(totSuppl) : '—') + '</strong></td>' +
        '<td><strong style="color:var(--error)">−' + ILS(totAdv) + '</strong></td>' +
        '<td><strong style="color:' + (grand >= 0 ? 'var(--success)' : 'var(--error)') + ';font-size:16px">' + ILS(grand) + '</strong></td>' +
        '<td></td>' +
      '</tr></tfoot>' +
    '</table></div>';
}

/* ================================================================
   TAB 4 — Z REPORT
================================================================ */
function renderZ() {
  var ym   = document.getElementById('z-month').value;
  var days = daysInMonth(ym);
  var cont = document.getElementById('z-content');

  var fields = [
    {k:'cash',   l:'💵 מזומן'},
    {k:'credit', l:'💳 אשראי'},
    {k:'wolt',   l:'🛵 וולט'},
    {k:'hakafe', l:'☕ הקפה'},
  ];

  var totals = {cash:0, credit:0, wolt:0, hakafe:0};
  var tbody = '';
  var vat = toNum((S.settings || {}).vat) || 17;
  var vatFactor = 1 + vat / 100;

  for (var d = 1; d <= days; d++) {
    var ds  = dateFull(ym, d);
    var wd  = getDow(ds);
    var rec = (S.zReports[ds] || {});
    fields.forEach(function(f){ totals[f.k] += toNum(rec[f.k]); });
    var dt = fields.reduce(function(s,f){ return s + toNum(rec[f.k]); }, 0);
    var dtNet = dt > 0 ? dt / vatFactor : 0;

    tbody += '<tr class="' + (wd===6?'tr-shabbat':'') + '">';
    tbody += dateCell(d, wd, ds);
    tbody += '<td><input type="text" class="ti" style="width:75px;text-align:center"' +
      ' data-ds="' + ds + '" data-fk="reportNum"' +
      ' value="' + escHtml(rec.reportNum || '') + '" placeholder="—"' +
      ' oninput="onZInput(this)"></td>';
    fields.forEach(function(f){
      tbody += '<td><input type="number" class="ti ti-w80" min="0" step="1"' +
        ' data-ds="' + ds + '" data-fk="' + f.k + '"' +
        ' value="' + (toNum(rec[f.k]) || '') + '" placeholder="0"' +
        ' oninput="onZInput(this)"></td>';
    });
    tbody += '<td data-zrt="' + ds + '">' +
      '<strong style="color:' + (dt>0?'var(--success)':'var(--text-muted)') + '">' + (dt>0?ILS(dt):'—') + '</strong>' +
      (dtNet > 0 ? '<div style="font-size:10.5px;color:#2563eb;font-weight:600;margin-top:1px">ללא מע"מ: ' + ILS(dtNet) + '</div>' : '') +
    '</td>';
    tbody += '</tr>';
  }

  var grand    = Object.values(totals).reduce(function(a,b){return a+b;}, 0);
  var grandNet = grand > 0 ? grand / vatFactor : 0;

  function zNetLabel(v) { return v > 0 ? ILS(v / vatFactor) : '—'; }

  var theadCells = '<th style="min-width:70px">יום</th><th style="min-width:80px"># דוח</th>';
  fields.forEach(function(f){ theadCells += '<th style="min-width:90px">' + f.l + '</th>'; });
  theadCells += '<th style="min-width:100px">📊 סה"כ יומי</th>';

  var nvStyle = 'color:#2563eb;font-size:12px;font-weight:600';

  cont.innerHTML =
    '<div class="summary-grid">' +
      '<div class="s-card"><div class="s-label">💵 מזומן</div><div class="s-value" id="zs-cash">' + ILS(totals.cash) + '</div><div style="' + nvStyle + ';margin-top:2px" id="zs-cash-net">ללא מע"מ: ' + zNetLabel(totals.cash) + '</div></div>' +
      '<div class="s-card"><div class="s-label">💳 אשראי</div><div class="s-value" id="zs-credit">' + ILS(totals.credit) + '</div><div style="' + nvStyle + ';margin-top:2px" id="zs-credit-net">ללא מע"מ: ' + zNetLabel(totals.credit) + '</div></div>' +
      '<div class="s-card"><div class="s-label">🛵 וולט</div><div class="s-value" id="zs-wolt">' + ILS(totals.wolt) + '</div><div style="' + nvStyle + ';margin-top:2px" id="zs-wolt-net">ללא מע"מ: ' + zNetLabel(totals.wolt) + '</div></div>' +
      '<div class="s-card"><div class="s-label">☕ הקפה</div><div class="s-value" id="zs-hakafe">' + ILS(totals.hakafe) + '</div><div style="' + nvStyle + ';margin-top:2px" id="zs-hakafe-net">ללא מע"מ: ' + zNetLabel(totals.hakafe) + '</div></div>' +
      '<div class="s-card green-card"><div class="s-label">📊 סה"כ חודש</div><div class="s-value green" id="zs-grand">' + ILS(grand) + '</div><div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-top:2px" id="zs-grand-net">ללא מע"מ: ' + ILS(grandNet) + '</div></div>' +
    '</div>' +
    '<div class="table-wrap"><table>' +
      '<thead><tr>' + theadCells + '</tr></thead>' +
      '<tbody>' + tbody + '</tbody>' +
      '<tfoot>' +
        '<tr class="tr-total">' +
          '<td><strong>סה"כ עם מע"מ</strong></td>' +
          '<td></td>' +
          '<td id="zf-cash"><strong>'   + ILS(totals.cash)   + '</strong></td>' +
          '<td id="zf-credit"><strong>' + ILS(totals.credit) + '</strong></td>' +
          '<td id="zf-wolt"><strong>'   + ILS(totals.wolt)   + '</strong></td>' +
          '<td id="zf-hakafe"><strong>' + ILS(totals.hakafe) + '</strong></td>' +
          '<td id="zf-grand"><strong style="color:var(--success);font-size:15px">' + ILS(grand) + '</strong></td>' +
        '</tr>' +
        '<tr>' +
          '<td style="' + nvStyle + '">ללא מע"מ (' + vat + '%)</td>' +
          '<td></td>' +
          '<td id="zf-cash-net" style="' + nvStyle + '">'   + zNetLabel(totals.cash)   + '</td>' +
          '<td id="zf-credit-net" style="' + nvStyle + '">' + zNetLabel(totals.credit) + '</td>' +
          '<td id="zf-wolt-net" style="' + nvStyle + '">'   + zNetLabel(totals.wolt)   + '</td>' +
          '<td id="zf-hakafe-net" style="' + nvStyle + '">' + zNetLabel(totals.hakafe) + '</td>' +
          '<td id="zf-grand-net" style="' + nvStyle + '"><strong>' + ILS(grandNet) + '</strong></td>' +
        '</tr>' +
      '</tfoot>' +
    '</table></div>' +
    '<div style="margin-top:10px;font-size:12.5px;color:var(--text-muted)">💡 הזן בכל תא — נשמר אוטומטית · ללא מע"מ מחושב אוטומטית לפי ' + vat + '%</div>';
}

function onZInput(inp) {
  var ds = inp.dataset.ds;
  var fk = inp.dataset.fk;
  if (!S.zReports[ds]) S.zReports[ds] = {};
  S.zReports[ds][fk] = (fk === 'reportNum') ? inp.value : toNum(inp.value);
  persist();

  var rec = S.zReports[ds];
  var fkeys = ['cash','credit','wolt','hakafe'];
  var rt = fkeys.reduce(function(s,k){ return s + toNum(rec[k]); }, 0);
  var rtEl = document.querySelector('[data-zrt="' + ds + '"]');
  if (rtEl) rtEl.innerHTML = '<strong style="color:' + (rt>0?'var(--success)':'var(--text-muted)') + '">' + (rt>0?ILS(rt):'—') + '</strong>';

  var ym   = document.getElementById('z-month').value;
  var days = daysInMonth(ym);
  var totals = {cash:0, credit:0, wolt:0, hakafe:0};
  for (var d2 = 1; d2 <= days; d2++) {
    var r2 = S.zReports[dateFull(ym,d2)] || {};
    fkeys.forEach(function(k){ totals[k] += toNum(r2[k]); });
  }
  var grand = Object.values(totals).reduce(function(a,b){return a+b;},0);
  var vat2 = toNum((S.settings || {}).vat) || 17;
  var vatF2 = 1 + vat2 / 100;
  function g(id){ return document.getElementById(id); }
  function zn(v){ return v > 0 ? ILS(v / vatF2) : '—'; }
  if(g('zs-cash'))       g('zs-cash').textContent       = ILS(totals.cash);
  if(g('zs-credit'))     g('zs-credit').textContent     = ILS(totals.credit);
  if(g('zs-wolt'))       g('zs-wolt').textContent       = ILS(totals.wolt);
  if(g('zs-hakafe'))     g('zs-hakafe').textContent     = ILS(totals.hakafe);
  if(g('zs-grand'))      g('zs-grand').textContent      = ILS(grand);
  if(g('zs-cash-net'))   g('zs-cash-net').textContent   = 'ללא מע"מ: ' + zn(totals.cash);
  if(g('zs-credit-net')) g('zs-credit-net').textContent = 'ללא מע"מ: ' + zn(totals.credit);
  if(g('zs-wolt-net'))   g('zs-wolt-net').textContent   = 'ללא מע"מ: ' + zn(totals.wolt);
  if(g('zs-hakafe-net')) g('zs-hakafe-net').textContent = 'ללא מע"מ: ' + zn(totals.hakafe);
  if(g('zs-grand-net'))  g('zs-grand-net').textContent  = 'ללא מע"מ: ' + ILS(grand / vatF2);
  if(g('zf-cash'))       g('zf-cash').innerHTML       = '<strong>' + ILS(totals.cash)   + '</strong>';
  if(g('zf-credit'))     g('zf-credit').innerHTML     = '<strong>' + ILS(totals.credit) + '</strong>';
  if(g('zf-wolt'))       g('zf-wolt').innerHTML       = '<strong>' + ILS(totals.wolt)   + '</strong>';
  if(g('zf-hakafe'))     g('zf-hakafe').innerHTML     = '<strong>' + ILS(totals.hakafe) + '</strong>';
  if(g('zf-grand'))      g('zf-grand').innerHTML      = '<strong style="color:var(--success);font-size:15px">' + ILS(grand) + '</strong>';
  if(g('zf-cash-net'))   g('zf-cash-net').textContent   = zn(totals.cash);
  if(g('zf-credit-net')) g('zf-credit-net').textContent = zn(totals.credit);
